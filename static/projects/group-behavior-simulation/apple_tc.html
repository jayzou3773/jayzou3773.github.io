<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CDT — apple_tc</title>
<style>
  /* ===== Design tokens ===== */
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --ink: #1a1d23;
    --ink-soft: #5d6470;
    --ink-faint: #9098a3;
    --line: #e6e2d6;
    --line-soft: #f0ece0;
    --accent: #ff5d3b;        /* Dutch orange */
    --accent-soft: #ffece5;
    --base: #1d6fe0;          /* base CDT */
    --base-soft: #e8f1ff;
    --adapt: #5e35b1;         /* adapted CDT */
    --adapt-soft: #efe8f7;
    --add: #2e8b57;
    --add-soft: #e0f1e8;
    --modify: #d97706;
    --modify-soft: #fdf1d9;
    --delete: #dc2626;
    --delete-soft: #fce4e4;
    --shadow: 0 1px 3px rgba(15, 20, 30, 0.06), 0 8px 24px rgba(15, 20, 30, 0.06);
    --radius: 12px;
    --radius-sm: 8px;
    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans); margin: 0; background: var(--bg); color: var(--ink);
    overflow: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  .main-svg { width: 100vw; height: 100vh; cursor: grab; }
  .main-svg:active { cursor: grabbing; }

  /* ===== Tree links ===== */
  .link {
    fill: none; stroke: #c9c2ad; stroke-width: 1.5px; opacity: 0.85;
    transition: opacity 0.25s, stroke 0.25s, stroke-width 0.25s;
  }
  .link.link-dimmed { opacity: 0.1; }
  .link.link-active { stroke: var(--accent); stroke-width: 2.5px; opacity: 1; }

  /* ===== Tree nodes ===== */
  .node { cursor: pointer; }
  .node circle, .node .pie-slice {
    transition: filter 0.2s, opacity 0.25s, stroke-width 0.2s;
  }
  .node text {
    font-family: var(--font-sans); font-size: 11px; font-weight: 500;
    fill: var(--ink); pointer-events: none;
    paint-order: stroke; stroke: var(--bg); stroke-width: 3.5px; stroke-linejoin: round;
  }
  .node text.node-label-secondary {
    font-size: 10px; fill: var(--ink-faint); font-weight: 400;
  }
  .node.node-dimmed circle, .node.node-dimmed .pie-slice { opacity: 0.18; }
  .node.node-dimmed text { opacity: 0.35; }

  /* glow rings instead of CSS filter (clearer on large trees) */
  .glow-ring { fill: none; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .node.node-glow-base    .glow-ring.gr-base    { opacity: 1; stroke: var(--base);  stroke-width: 2.5px; }
  .node.node-glow-adapted .glow-ring.gr-adapt   { opacity: 1; stroke: var(--adapt); stroke-width: 2.5px; }
  .node.node-glow-both    .glow-ring.gr-base    { opacity: 1; stroke: var(--base);  stroke-width: 2.5px; }
  .node.node-glow-both    .glow-ring.gr-adapt   { opacity: 1; stroke: var(--adapt); stroke-width: 2.5px; }

  /* event count badge on node */
  .event-badge {
    pointer-events: none; opacity: 0.95;
  }
  .event-badge rect {
    fill: var(--ink); rx: 8;
  }
  .event-badge text {
    fill: #fff; font-size: 9px; font-weight: 700;
    paint-order: normal; stroke: none;
  }

  /* ===== Header bar ===== */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    background: rgba(255,255,255,0.88); backdrop-filter: saturate(1.4) blur(10px);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; padding: 0 18px; z-index: 6;
  }
  #topbar .brand {
    font-weight: 700; letter-spacing: -0.01em; font-size: 14px;
  }
  #topbar .brand .accent-bar {
    display: inline-block; width: 14px; height: 14px; background: var(--accent);
    border-radius: 3px; vertical-align: -2px; margin-right: 8px;
  }
  #topbar .crumbs {
    color: var(--ink-faint); font-size: 12px; margin-left: 12px;
    border-left: 1px solid var(--line); padding-left: 12px;
  }
  #topbar .right { margin-left: auto; display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--ink-faint); }
  #topbar .legend-pill {
    display: inline-flex; gap: 4px; align-items: center;
    padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
    background: #fff;
  }
  #topbar .legend-pill .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  }

  /* ===== Side controls ===== */
  #controls {
    position: absolute; top: 60px; left: 12px; z-index: 5;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 8px; box-shadow: var(--shadow);
    width: 200px; max-height: calc(100vh - 80px); overflow-y: auto;
    display: flex; flex-direction: column; gap: 6px;
  }
  #controls .panel-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint); margin: 0 0 4px;
  }
  #controls .section { display: flex; flex-direction: column; gap: 4px; }
  #controls .phase-btn, #controls .case-btn {
    display: block; width: 100%; text-align: left;
    padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer;
    border: 1px solid var(--line); background: #fff;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
    color: var(--ink); font-family: inherit; font-size: 10.5px;
  }
  #controls .phase-btn:hover, #controls .case-btn:hover { border-color: var(--ink-faint); }
  #controls .phase-btn:active, #controls .case-btn:active { transform: translateY(1px); }
  #controls .phase-btn .phase-name { font-weight: 600; line-height: 1.2; font-size: 10.5px; word-wrap: break-word; }
  #controls .phase-btn .phase-meta { font-size: 9px; color: var(--ink-faint); margin-top: 3px; word-wrap: break-word; }
  #controls .phase-btn .phase-actions { font-size: 9px; margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
  #controls .phase-btn .pa { display: inline-flex; align-items: center; gap: 2px; padding: 1px 4px; border-radius: 4px; font-weight: 600; }
  #controls .phase-btn .pa.modify { background: var(--modify-soft); color: var(--modify); }
  #controls .phase-btn .pa.add    { background: var(--add-soft);    color: var(--add); }
  #controls .phase-btn .pa.delete { background: var(--delete-soft); color: var(--delete); }
  #controls .phase-btn.active {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  #controls .phase-btn.active .phase-meta { color: rgba(255,255,255,0.7); }
  #controls .phase-btn.active .pa { background: rgba(255,255,255,0.16); color: #fff; }

  #controls .case-btn { border-left: 3px solid var(--adapt); }
  #controls .case-btn .case-eid { font-weight: 700; font-family: var(--font-mono); font-size: 9.5px; }
  #controls .case-btn .case-tag { font-size: 10px; color: var(--ink-faint); margin-left: 4px; }
  #controls .case-btn .case-action { font-size: 9.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.35; word-wrap: break-word; }
  #controls .case-btn .case-scores { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; align-items: center; }
  #controls .case-btn .score-chip {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; text-align: center;
    color: #fff; letter-spacing: 0.02em;
  }
  #controls .case-btn .score-chip.s-0 { background: var(--delete); }
  #controls .case-btn .score-chip.s-50 { background: var(--modify); }
  #controls .case-btn .score-chip.s-100 { background: var(--add); }
  #controls .case-btn .arrow { color: var(--ink-faint); font-weight: 400; align-self: center; font-size: 11px; }
  #controls .case-btn.active {
    background: var(--adapt-soft); border-color: var(--adapt);
  }

  /* ===== Tooltip (hover quick info) ===== */
  #tooltip {
    position: absolute; padding: 12px 14px; background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    box-shadow: var(--shadow); max-width: 460px; min-width: 280px;
    font-size: 12.5px; line-height: 1.5; pointer-events: auto; display: none; z-index: 9;
  }
  #tooltip .nid {
    display: inline-block; font-family: var(--font-mono); font-size: 10px;
    background: var(--ink); color: #fff; padding: 1px 7px; border-radius: 4px;
    font-weight: 600; letter-spacing: 0.02em;
  }
  #tooltip .gate {
    color: var(--accent); font-weight: 600; margin-top: 6px; font-size: 12px; line-height: 1.4;
  }
  #tooltip .ev-pill {
    display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-weight: 600; margin-left: 6px;
  }
  #tooltip .stmt {
    color: var(--ink); margin: 5px 0 0; padding: 5px 8px; border-radius: 5px;
    background: var(--line-soft); cursor: pointer; transition: background 0.15s;
    font-size: 10.5px;
  }
  #tooltip .stmt:hover { background: var(--accent-soft); }
  #tooltip .stmt b { color: var(--accent); font-weight: 700; }
  #tooltip .empty { color: var(--ink-faint); font-style: italic; font-size: 12px; margin-top: 4px; }
  #tooltip .adapter-section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
  #tooltip .adapter-action {
    font-weight: 700; font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase;
    margin-top: 6px;
  }
  #tooltip .adapter-action.modify { color: var(--modify); }
  #tooltip .adapter-action.delete { color: var(--delete); }
  #tooltip .adapter-action.add    { color: var(--add); }
  #tooltip .old-stmt {
    color: var(--ink-faint); text-decoration: line-through;
    margin: 3px 0; padding: 4px 8px; background: var(--delete-soft); border-radius: 4px;
    font-size: 11.5px; cursor: pointer;
  }
  #tooltip .new-stmt {
    color: var(--ink); margin: 3px 0; padding: 4px 8px;
    background: var(--add-soft); border-radius: 4px; font-size: 11.5px; cursor: pointer;
  }
  #tooltip .coverage { color: var(--ink-faint); font-size: 10.5px; margin-top: 3px; }
  #tooltip .open-panel-cta {
    display: block; margin-top: 10px; padding: 6px 10px;
    background: var(--ink); color: #fff; text-align: center; border-radius: 6px;
    font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.02em;
  }
  #tooltip .open-panel-cta:hover { background: var(--accent); }

  /* ===== Right-side drawers ===== */
  .drawer {
    position: absolute; top: 0; right: 0; height: 100vh;
    background: var(--surface); border-left: 1px solid var(--line);
    z-index: 8; display: none; box-shadow: -8px 0 24px rgba(15,20,30,0.06);
    overflow: hidden; flex-direction: column;
  }
  .drawer.open { display: flex; }

  #node-panel { width: 540px; }
  #stmt-panel { width: 720px; }
  #case-panel { width: 920px; }

  .drawer-header {
    flex: 0 0 auto; padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
  }
  .drawer-header .head-tag {
    font-family: var(--font-mono); font-size: 10.5px; padding: 2px 8px;
    border-radius: 4px; font-weight: 700; letter-spacing: 0.04em;
    background: var(--ink); color: #fff;
  }
  .drawer-header h3 {
    margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
    flex: 1; word-break: break-word;
  }
  .drawer-header .close-x {
    border: 0; background: transparent; cursor: pointer; font-size: 22px;
    color: var(--ink-faint); padding: 0 4px; line-height: 1;
  }
  .drawer-header .close-x:hover { color: var(--ink); }
  .drawer-body { flex: 1 1 auto; overflow-y: auto; padding: 0; }

  .drawer-section { padding: 14px 18px; border-bottom: 1px solid var(--line-soft); }
  .drawer-section:last-child { border-bottom: 0; }
  .drawer-section .label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 8px;
  }
  .drawer-section .body { font-size: 13px; line-height: 1.55; color: var(--ink); word-wrap: break-word; }
  .drawer-section .body.muted { color: var(--ink-soft); }
  .drawer-section .body b { color: var(--accent); font-weight: 600; }

  /* === node panel specifics === */
  #node-panel .stmt-card {
    border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px 12px;
    margin-bottom: 8px; background: #fff;
  }
  #node-panel .stmt-card .text { font-size: 12.5px; color: var(--ink); cursor: pointer; }
  #node-panel .stmt-card .text:hover { color: var(--accent); }
  #node-panel .stmt-card .meta {
    font-size: 10.5px; color: var(--ink-faint); margin-top: 5px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  #node-panel .stmt-card .meta .pill {
    background: var(--line-soft); color: var(--ink-soft);
    padding: 1px 7px; border-radius: 4px; font-weight: 600;
  }
  #node-panel .event-list { max-height: 400px; overflow-y: auto; }
  #node-panel .event-row {
    padding: 6px 8px; border: 1px solid var(--line); border-radius: var(--radius-sm);
    margin-bottom: 6px; background: #fff;
  }
  #node-panel .event-row.mini { padding: 7px 10px; margin-bottom: 5px; }
  #node-panel .event-row .top {
    display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--ink-faint);
  }
  #node-panel .event-row .eid {
    font-family: var(--font-mono); font-weight: 700; color: var(--ink);
  }
  #node-panel .event-row .phase-tag {
    background: var(--base-soft); color: var(--base);
    padding: 1px 6px; border-radius: 3px; font-weight: 700; font-size: 10px;
  }
  #node-panel .event-row .action { font-size: 12.5px; color: var(--ink); margin-top: 4px; }
  #node-panel .event-row .bg { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }

  /* Cluster cards */
  #node-panel .cluster-list { display: flex; flex-direction: column; gap: 12px; }
  #node-panel .cluster-card {
    border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; overflow: hidden;
  }
  #node-panel .cluster-card .cluster-head {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 12px;
    background: linear-gradient(180deg, #fffaf3, #fff);
    border-bottom: 1px solid var(--line-soft);
  }
  #node-panel .cluster-card .cluster-label {
    flex: 1;
    font-size: 12.5px; font-weight: 700; color: var(--ink);
    line-height: 1.35;
  }
  #node-panel .cluster-card .cluster-count {
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
    color: var(--accent); background: var(--accent-soft);
    padding: 2px 8px; border-radius: 999px; white-space: nowrap;
  }
  #node-panel .cluster-card .cluster-reps {
    padding: 8px 10px;
  }
  #node-panel .cluster-card .cluster-more {
    margin-top: 4px; padding: 4px 8px;
    font-size: 11px; color: var(--ink-faint); font-style: italic;
    background: var(--line-soft); border-radius: 4px; text-align: center;
  }

  /* === statement panel === */
  #stmt-panel .stmt-text {
    font-size: 14px; color: var(--ink); padding: 14px 18px; line-height: 1.55;
    background: var(--accent-soft); border-bottom: 1px solid var(--line-soft);
  }
  #stmt-panel .gate-row {
    padding: 12px 18px; background: #fffaf6; border-bottom: 1px solid var(--line-soft);
    font-size: 12px; color: var(--ink-soft); line-height: 1.45;
  }
  #stmt-panel .gate-row .gate-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 4px;
  }
  #stmt-panel .ev-section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    margin: 14px 18px 8px; color: var(--ink-faint);
  }
  #stmt-panel .ev-section-label .count { color: var(--ink); margin-left: 4px; }
  #stmt-panel .ev-section-label.yes { color: var(--add); }
  #stmt-panel .ev-section-label.no { color: var(--delete); }
  #stmt-panel .ev-card {
    margin: 0 18px 8px; padding: 10px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: #fff; border-left-width: 4px;
  }
  #stmt-panel .ev-card.yes-card { border-left-color: var(--add); }
  #stmt-panel .ev-card.no-card { border-left-color: var(--delete); }
  #stmt-panel .ev-card .top {
    display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--ink-faint);
  }
  #stmt-panel .ev-card .eid { font-family: var(--font-mono); font-weight: 700; color: var(--ink); }
  #stmt-panel .ev-card .phase-tag {
    background: var(--base-soft); color: var(--base); padding: 1px 6px; border-radius: 3px;
    font-weight: 700; font-size: 10px;
  }
  #stmt-panel .ev-card .action { font-size: 12.5px; color: var(--ink); margin-top: 5px; }
  #stmt-panel .ev-card .bg { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }

  /* Statement-panel cluster blocks (semantic grouping of supporting events) */
  #stmt-panel .stmt-cluster {
    margin: 0 18px 14px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; overflow: hidden;
  }
  #stmt-panel .stmt-cluster-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    background: linear-gradient(180deg, #f3fbf6, #fff);
    border-bottom: 1px solid var(--line-soft);
  }
  #stmt-panel .stmt-cluster-label {
    flex: 1; font-size: 12.5px; font-weight: 700; color: var(--ink); line-height: 1.35;
  }
  #stmt-panel .stmt-cluster-count {
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
    color: var(--add); background: var(--add-soft);
    padding: 2px 8px; border-radius: 999px; white-space: nowrap;
  }
  #stmt-panel .stmt-cluster-reps { padding: 10px 12px; }
  #stmt-panel .stmt-cluster-reps .ev-card { margin: 0 0 8px; }
  #stmt-panel .stmt-cluster-reps .ev-card:last-child { margin-bottom: 0; }
  #stmt-panel .stmt-cluster-others {
    padding: 10px 12px; border-top: 1px dashed var(--line);
    font-size: 11px; color: var(--ink-soft); line-height: 1.7;
  }
  #stmt-panel .stmt-cluster-others-label {
    font-weight: 600; color: var(--ink-faint); display: block; margin-bottom: 4px;
  }
  #stmt-panel .stmt-cluster-other-eid {
    display: inline-block; font-family: var(--font-mono); font-size: 10.5px;
    padding: 1px 7px; margin: 2px 4px 2px 0; border: 1px solid var(--line);
    border-radius: 999px; background: #fafaf7; color: var(--ink);
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  #stmt-panel .stmt-cluster-other-eid:hover { background: var(--accent-soft); border-color: var(--accent); }
  #stmt-panel .stmt-cluster-other-card { margin-top: 6px; }
  #stmt-panel .stmt-cluster-other-card .ev-card { margin: 0; }
  #stmt-panel .borrowed-note {
    margin: 0 18px 10px; padding: 8px 12px;
    background: #fffaf3; border-left: 3px solid var(--modify);
    border-radius: 4px; font-size: 11.5px; color: var(--ink-soft); line-height: 1.5;
  }

  /* === case panel === */
  #case-panel .pred-card {
    margin: 0 18px 10px; padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: #fff;
  }
  #case-panel .pred-card .pc-head {
    display: flex; align-items: center; gap: 8px; font-size: 11px;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-faint);
  }
  #case-panel .pred-card.base    .pc-head .name-pill { color: #fff; background: var(--ink-faint); }
  #case-panel .pred-card.basecdt .pc-head .name-pill { color: #fff; background: var(--base); }
  #case-panel .pred-card.adapted .pc-head .name-pill { color: #fff; background: var(--adapt); }
  #case-panel .pred-card .name-pill { padding: 2px 8px; border-radius: 4px; }
  #case-panel .score-badge {
    margin-left: auto; font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 999px; color: #fff;
  }
  #case-panel .score-badge.s-0 { background: var(--delete); }
  #case-panel .score-badge.s-50 { background: var(--modify); }
  #case-panel .score-badge.s-100 { background: var(--add); }
  #case-panel .pred-text { margin-top: 8px; font-size: 13px; color: var(--ink); line-height: 1.55; }
  #case-panel .pred-reason {
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--line);
    font-size: 11.5px; color: var(--ink-soft); line-height: 1.5;
  }
  #case-panel .stmt-counts {
    font-size: 11.5px; color: var(--ink-soft); margin: 10px 18px 6px;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  #case-panel .stmt-counts b { color: var(--ink); }

  #case-panel .compare-cols { display: flex; gap: 10px; padding: 0 18px 18px; }
  #case-panel .compare-col {
    flex: 1; min-width: 0;
    border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px;
    background: #fff;
  }
  #case-panel .col-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  #case-panel .col-title.base    { color: var(--base); }
  #case-panel .col-title.adapted { color: var(--adapt); }
  #case-panel .stmt-item {
    font-size: 12px; color: var(--ink); margin: 4px 0; padding: 6px 8px;
    border-radius: 5px; line-height: 1.45; cursor: pointer;
    word-wrap: break-word;
  }
  #case-panel .stmt-item.shared       { background: var(--line-soft); }
  #case-panel .stmt-item.only-base    { background: var(--base-soft);  border-left: 3px solid var(--base); }
  #case-panel .stmt-item.only-adapted { background: var(--adapt-soft); border-left: 3px solid var(--adapt); }
  #case-panel .stmt-item:hover { outline: 1px solid var(--accent); }

  /* ===== Loading ===== */
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 14px; color: var(--ink-faint);
  }
</style>
</head>

  <div class="right">

    <span class="legend-pill"><span class="dot" style="background:#5e35b1"></span> adapted</span>
    <span class="legend-pill"><span class="dot" style="background:#d97706"></span> modify</span>

    <span class="legend-pill"><span class="dot" style="background:#dc2626"></span> delete</span>

</div>

ge content catalogs and creator experiences. Additionally, recent regulatory changes in the EU have prompted Apple to find ways to create more value for developers within its ecosystem.", "phase": 0}, "apple_0013": {"title": "Apple released software updates to fix a zero-day security flaw affecting its devices.", "date": "2025-01-28", "action": "Apple released software updates to fix a zero-day security flaw affecting its devices.", "background": "A zero-day security bug was discovered in Core Media, affecting a range of Apple devices, which could have allowed hackers to gain elevated privileges and access device data. This bug was reportedly being actively exploited against users with older software versions.", "phase": 0}, "apple_0014": {"title": "Apple paused the feature of news summaries in iOS 18 due to inaccuracies.", "date": "2025-01-29", "action": "Apple paused the feature of news summaries in iOS 18 due to inaccuracies.", "background": "Apple faced challenges with its AI models, particularly with the accuracy of news summaries in iOS 18, which led to misinformation concerns. This occurred amidst a competitive tech landscape and declining iPhone sales in China, prompting Apple to reassess its AI strategy.", "phase": 0}, "apple_0015": {"title": "Apple removed DeepSeek's app from the App Store in Italy.", "date": "2025-01-29", "action": "Apple removed DeepSeek's app from the App Store in Italy.", "background": "Italian authorities requested information from DeepSeek about its user data handling practices, following a complaint by a consumer coalition regarding the company's privacy policy. The authorities expressed concerns over data storage practices, particularly the storage of information on servers located in China, and set a deadline for DeepSeek to respond.", "phase": 0}, "apple_0018": {"title": "Apple will roll out support for additional languages in its AI suite, Apple Intelligence, in April.", "date": "2025-01-31", "action": "Apple will roll out suppo ple announced a new set of child safety initiatives for its App Store, including an age-checking system for apps.", "date": "2025-03-27", "action": "Apple announced a new set of child safety initiatives for its App Store, including an age-checking system for apps.", "background": "A new Utah law requires app stores to take responsibility for verifying users' ages and obtaining parental consent for minors. This law is part of a broader trend where multiple states are considering legislation focused on age verification and youth safety in app stores. The tech industry has been debating who should be responsible for age verification, with some companies advocating for app stores to take on this role.", "phase": 0}, "apple_0077": {"title": "Apple is developing a new version of its Health app that includes an AI coach.", "date": "2025-03-30", "action": "Apple is developing a new version of its Health app that includes an AI coach.", "background": "Apple has been working on enhancing its health-related services and is looking to integrate advanced technology to provide personalized health advice to users. The company is leveraging data from medical devices and collaborating with healthcare professionals to improve its offerings.", "phase": 1}, "apple_0078": {"title": "Apple rolls out Priority Notifications and expands Apple Intelligence to the EU.", "date": "2025-03-31", "action": "Apple rolls out Priority Notifications and expands Apple Intelligence to the EU.", "background": "Apple Intelligence, the company's suite of AI-powered tools, has been gradually introducing new features since its initial launch. The company has been expanding its AI capabilities and availability across different regions and platforms, while also adapting to regulatory environments such as those in the EU.", "phase": 1}, "apple_0082": {"title": "Apple considers importing more iPhones from India to sidestep tariffs.", "date": "2025-04-08", "action": "Apple considers importing more iPhones from In  in favor of Epic Games in a case against Apple, ordering the company not to prohibit apps from including features that could redirect users to their own websites for making digital purchases. This legal decision followed a lawsuit concerning Apple's control over transactions in apps hosted on its App Store.", "phase": 1}, "apple_0097": {"title": "Apple was found in willful violation of a 2021 injunction prohibiting anticompetitive pricing.", "date": "2025-05-03", "action": "Apple was found in willful violation of a 2021 injunction prohibiting anticompetitive pricing.", "background": "Epic Games has been in a legal dispute with Apple over the company's pricing practices. A judge ruled on the case, addressing Apple's compliance with previous legal orders.", "phase": 1}, "apple_0098": {"title": "Apple filed an appeal against a court ruling that required it to allow external payment links in apps.", "date": "2025-05-05", "action": "Apple filed an appeal against a court ruling that required it to allow external payment links in apps.", "background": "A recent court decision challenged Apple's App Store policies, impacting its business model by mandating changes in how app developers can offer payment options. This decision was part of a legal battle with Epic Games, which has broader implications for Apple's revenue from in-app purchases.", "phase": 1}, "apple_0099": {"title": "Apple plans to split the launch of the iPhone 18 into two phases in 2026.", "date": "2025-05-05", "action": "Apple plans to split the launch of the iPhone 18 into two phases in 2026.", "background": "Apple is considering its supply chain logistics and market strategy for upcoming iPhone models, with an emphasis on managing production timelines and potentially diversifying manufacturing locations due to geopolitical factors affecting costs.", "phase": 1}, "apple_0100": {"title": "Apple updated its App Store developer guidelines to allow app developers to link to alternative payment mechanisms.", " rience with low-power consumption.", "phase": 1}, "apple_0107": {"title": "Apple plans to increase the prices of its upcoming iPhone lineup.", "date": "2025-05-12", "action": "Apple plans to increase the prices of its upcoming iPhone lineup.", "background": "Apple is facing increased costs due to tariffs on imports from China and is importing more iPhones from India to mitigate these tariffs. The company is also introducing new features and designs in its upcoming iPhone models.", "phase": 1}, "apple_0110": {"title": "Apple diversifies its manufacturing base by increasing production in India.", "date": "2025-05-14", "action": "Apple diversifies its manufacturing base by increasing production in India.", "background": "Apple is seeking to reduce its reliance on China for manufacturing due to trade uncertainties between the U.S. and China. The company is looking to expand its manufacturing capabilities in India to avoid potential tariffs and maintain competitive pricing for its devices.", "phase": 1}, "apple_0111": {"title": "Apple implemented user-disclosure screens on the EU App Store to comply with the Digital Markets Act.", "date": "2025-05-15", "action": "Apple implemented user-disclosure screens on the EU App Store to comply with the Digital Markets Act.", "background": "The Digital Markets Act (DMA) in the EU requires companies like Apple to allow third-party payment systems in apps. Apple had previously suffered a legal setback in the U.S. regarding similar issues with app payment systems. The company is navigating regulatory requirements while maintaining its business model, which includes earning commissions from in-app purchases.", "phase": 1}, "apple_0114": {"title": "Apple instructed Patreon to modify its app to open the checkout option in an external browser.", "date": "2025-05-16", "action": "Apple instructed Patreon to modify its app to open the checkout option in an external browser.", "background": "Following a court ruling in the Apple-Epic legal battle, Apple had to support external payments in apps published on its U.S. App Store without charging commissions. This led to changes in how apps like Patreon could offer payment options to users, impacting the app's compliance with Apple's guidelines.", "phase": 1}, "apple_0115": {"title": "Apple blocked Fortnite from the U.S. and EU App Stores.", "date": "2025-05-16", "action": "Apple blocked Fortnite from the U.S. and EU App Stores.", "background": "Epic Games had a legal victory allowing external payments in the U.S. App Store, and attempted to resubmit Fortnite to the App Store. Epic Games needs to release weekly updates for Fortnite across all platforms simultaneously.", "phase": 1}, "apple_0117": {"title": "Apple decided not to take action on Epic Games' submission of Fortnite to the App Store until after the Ninth Circuit rules on its pending request for a partial stay of the new injunction.", "date": "2025-05-19", "action": "Apple decided not to take action on Epic Games' submission of Fortnite to the App Store until after the Ninth Circuit rules on its pending request for a partial stay of the new injunction.", "background": "Epic Games resubmitted Fortnite to the U.S. App Store following a court ruling that allowed developers to include links to external payment mechanisms. This submission came after a legal battle over Apple's App Store policies, which had previously restricted such links. The court had ruled that Apple was in violation of anticompetitive pricing and commissions, prompting Epic Games to seek enforcement of the injunction.", "phase": 1}, "apple_0118": {"title": "Apple approved a Spotify app update allowing in-app audiobook purchases.", "date": "2025-05-19", "action": "Apple approved a Spotify app update allowing in-app audiobook purchases.", "background": "A recent U.S. court ruling ordered Apple to stop charging fees on purchases made outside of the App Store, which affected how apps could handle in-app purchases. Previously, Spotify had to remove audiobook purchases due to Apple's strict rules around in-app purchases.", "phase": 1}, "apple_0119": {"title": "Apple integrated ChatGPT with Siri.", "date": "2025-05-19", "action": "Apple integrated ChatGPT with Siri.", "background": "Apple was exploring options to enhance Siri's capabilities with AI chatbots. There were internal discussions about which chatbot technology would best align with Apple's priorities, including data protection and long-term viability. The company was also considering other AI technologies for future integrations.", "phase": 1}, "apple_0120": {"title": "Apple approved Fortnite's return to the U.S. App Store.", "date": "2025-05-20", "action": "Apple approved Fortnite's return to the U.S. App Store.", "background": "Epic Games had been in a legal dispute with Apple over App Store policies, which resulted in a court ruling that required Apple to allow developers to collect payments outside the App Store. This ruling influenced the conditions under which apps could be listed on the App Store.", "phase": 1}, "apple_0121": {"title": "Apple plans to release a new set of AI products and frameworks at its Worldwide Developers Conference.", "date": "2025-05-20", "action": "Apple plans to release a new set of AI products and frameworks at its Worldwide Developers Conference.", "background": "Apple is looking to enhance its presence in the AI space and attract more developers and users by expanding its AI technology offerings. The company aims to catch up with competitors by allowing third-party developers to integrate its AI models into their software.", "phase": 1}, "apple_0122": {"title": "Apple organized and announced the Worldwide Developers Conference (WWDC) to be held from June 9 to June 13.", "date": "2025-05-20", "action": "Apple organized and announced the Worldwide Developers Conference (WWDC) to be held from June 9 to June 13.", "background": "Apple regularly holds events to engage with developers and announce updates to its ing the growing trend of cloud gaming, which allows users to stream games without downloading large files. Competitors like Netflix have also been investing in gaming, indicating a broader industry shift.", "phase": 1}, "apple_0128": {"title": "Apple expanded its Self Service Repair program to include iPads.", "date": "2025-05-28", "action": "Apple expanded its Self Service Repair program to include iPads.", "background": "Apple has been running a Self Service Repair program since 2022, allowing consumers to perform their own repairs on Apple products. The program provides access to repair manuals, genuine parts, and tools. It supports a wide range of Apple products and is available in multiple countries. The company aims to enhance product longevity and customer empowerment while maintaining safety, security, and privacy standards.", "phase": 1}, "apple_0130": {"title": "Apple changes the naming convention of its operating systems to be based on the year.", "date": "2025-05-29", "action": "Apple changes the naming convention of its operating systems to be based on the year.", "background": "Apple is preparing for its Worldwide Developers Conference (WWDC), where it plans to make several announcements. The company is focusing on creating a more consistent and less confusing branding strategy across its product lines. This includes updates to user interfaces and new features for various products.", "phase": 1}, "apple_0134": {"title": "Apple filed an emergency motion seeking a stay on a court ruling.", "date": "2025-06-06", "action": "Apple filed an emergency motion seeking a stay on a court ruling.", "background": "A U.S. court ruled that Apple must stop charging developers fees for payments made outside the App Store, which could lead to a loss of revenue for the company. This decision was part of a legal battle with Epic Games over App Store policies.", "phase": 1}, "apple_0138": {"title": "Apple delayed the release of a more personalized, AI-powered Siri.", "date atures to the Apple Vision Pro.", "date": "2025-03-31", "action": "Apple rolled out visionOS 2.4, introducing Apple Intelligence-powered AI features to the Apple Vision Pro.", "background": "Apple is continuously working on enhancing its product ecosystem and user experience by integrating advanced technologies and expanding its software capabilities. The company aims to provide innovative features that leverage AI to improve functionality and user engagement across its devices.", "phase": 1}, "apple_0080": {"title": "Apple changed its App Store rules to allow app developers to link to other purchasing mechanisms besides Apple's own.", "date": "2025-04-02", "action": "Apple changed its App Store rules to allow app developers to link to other purchasing mechanisms besides Apple's own.", "background": "Epic Games has been involved in legal battles with Apple over monopolistic practices in app distribution. A court ruling required changes to Apple's App Store policies to increase competition, impacting how developers can offer purchasing options.", "phase": 1}, "apple_0081": {"title": "Apple appealed a U.K. legal demand ordering access to encrypted cloud data.", "date": "2025-04-07", "action": "Apple appealed a U.K. legal demand ordering access to encrypted cloud data.", "background": "The U.K. government issued a legal demand for access to encrypted data, which led to a legal case involving privacy and national security concerns. The case attracted attention from privacy advocates and lawmakers, highlighting the tension between government surveillance and corporate data protection policies.", "phase": 1}, "apple_0083": {"title": "Apple approved a new ending for the series finale of 'Mythic Quest' on Apple TV+.", "date": "2025-04-12", "action": "Apple approved a new ending for the series finale of 'Mythic Quest' on Apple TV+.", "background": "The show 'Mythic Quest' on Apple TV+ was ending after four seasons, and there was an opportunity to provide a more satisfying co 1}, "apple_0088": {"title": "Apple decided to appeal the EU's decision to fine the company.", "date": "2025-04-23", "action": "Apple decided to appeal the EU's decision to fine the company.", "background": "The European Union fined Apple for allegedly breaching the Digital Markets Act by not allowing app developers to inform customers of alternative ways to buy digital products. This action is part of broader tensions between the EU and the U.S. over tech regulations.", "phase": 1}, "apple_0089": {"title": "Apple notified individuals worldwide about being targeted by government spyware.", "date": "2025-04-30", "action": "Apple notified individuals worldwide about being targeted by government spyware.", "background": "There have been instances of individuals being targeted by government spyware, and tech companies have been involved in notifying affected users. Apple has previously sent similar notifications to users in various countries, indicating a pattern of addressing such security threats.", "phase": 1}, "apple_0095": {"title": "Apple approved Spotify's U.S. app update allowing access to pricing information and external payment links.", "date": "2025-05-02", "action": "Apple approved Spotify's U.S. app update allowing access to pricing information and external payment links.", "background": "A U.S. judge ordered Apple to stop charging commissions on purchases through iPhone apps, and there has been ongoing scrutiny and legal pressure on Apple's App Store policies regarding developer rights and payment systems.", "phase": 1}, "apple_0101": {"title": "Apple changed its App Store rules for the U.S.", "date": "2025-05-07", "action": "Apple changed its App Store rules for the U.S.", "background": "A recent court ruling required Apple to open its U.S. App Store to external purchases, following a legal battle with Epic Games. The ruling highlighted that Apple had not fully complied with previous court orders regarding in-app purchases.", "phase": 1}, "apple_0102": {"title": "Apple is looking to add AI search engines to Safari.", "date": "2025-05-07", "action": "Apple is looking to add AI search engines to Safari.", "background": "Apple's Senior Vice President of Services testified about the company's current search engine deal with Google and noted a decline in Safari searches, attributing it to increased AI usage. He expressed belief in the potential of AI search providers to replace traditional search engines, prompting Apple's interest in exploring these technologies.", "phase": 1}, "apple_0104": {"title": "Apple filed an emergency motion to delay a court ruling that affects its App Store payment policies.", "date": "2025-05-08", "action": "Apple filed an emergency motion to delay a court ruling that affects its App Store payment policies.", "background": "A U.S. court ruled in favor of Epic Games, requiring changes to Apple's App Store policies regarding external payment systems. This ruling could lead to significant financial impacts for Apple, as it challenges the company's existing revenue model from app commissions.", "phase": 1}, "apple_0108": {"title": "Apple introduced a new 'audio wellness' collection called Sound Therapy on Apple Music.", "date": "2025-05-13", "action": "Apple introduced a new 'audio wellness' collection called Sound Therapy on Apple Music.", "background": "Apple Music is collaborating with Universal Music Group to enhance its service offerings. The focus is on creating a collection that combines familiar songs with sound waves designed to aid in focusing, relaxing, and sleeping. This initiative is part of a broader trend in the music industry towards wellness and mindfulness.", "phase": 1}, "apple_0109": {"title": "Apple announced a range of new accessibility features for its devices.", "date": "2025-05-13", "action": "Apple announced a range of new accessibility features for its devices.", "background": "Apple has been focusing on improving accessibility across its product line, collaborating with pliance to avoid significant fines. Apple had previously been fined for noncompliance and faced further penalties, prompting the need for changes in how app developers interact with customers and the fees associated with the App Store.", "phase": 2}, "apple_0183": {"title": "Apple released the theatrical film 'F1'.", "date": "2025-06-29", "action": "Apple released the theatrical film 'F1'.", "background": "Apple has been involved in producing films for Apple TV+ and has experienced mixed success at the box office. The company previously decided to scale back on budgets and theatrical releases after some projects underperformed. The popularity of Formula One racing and the involvement of notable figures contributed to the film's context.", "phase": 2}, "apple_0185": {"title": "Apple enforces App Store policies that include fees and restrictions on app developers.", "date": "2025-06-30", "action": "Apple enforces App Store policies that include fees and restrictions on app developers.", "background": "Apple operates a centralized app distribution platform for iOS devices, which has been criticized by developers for its fee structures and control over app distribution. This platform is a significant part of Apple's business model and affects how developers can interact with their customers and manage their apps.", "phase": 2}, "apple_0186": {"title": "Apple adjusted the design of iOS 26 beta 3 to reduce the transparency of the Liquid Glass interface.", "date": "2025-07-07", "action": "Apple adjusted the design of iOS 26 beta 3 to reduce the transparency of the Liquid Glass interface.", "background": "Apple introduced a new design language called Liquid Glass, inspired by the optical qualities of glass, but received user complaints about usability and legibility issues in the early beta versions.", "phase": 2}, "apple_0187": {"title": "Apple filed an appeal against the EU's €500 million fine.", "date": "2025-07-07", "action": "Apple filed an appeal against the EU's €500 oducts. The company aims to enhance its product offerings to maintain competitiveness and integrate advanced AI capabilities into its devices.", "phase": 3}, "apple_0298": {"title": "Apple is launching an enhanced video podcast experience in the Apple Podcasts app.", "date": "2026-02-17", "action": "Apple is launching an enhanced video podcast experience in the Apple Podcasts app.", "background": "Video podcasting is gaining popularity, with a significant portion of the U.S. population consuming video podcasts. Major platforms like YouTube, Spotify, and Netflix have already embraced video podcasting, creating a competitive environment. Apple aims to retain users within its ecosystem by improving its podcast offerings.", "phase": 3}, "apple_0299": {"title": "Apple released iOS 26.4 with new features and updates.", "date": "2026-02-20", "action": "Apple released iOS 26.4 with new features and updates.", "background": "Apple regularly updates its mobile operating system to introduce new functionalities and improvements. These updates are part of its ongoing strategy to enhance user experience, maintain competitiveness in the tech industry, and integrate advanced technologies such as AI and encryption into its ecosystem.", "phase": 3}, "apple_0300": {"title": "Apple plans a three-day flurry of announcements for new products.", "date": "2026-02-22", "action": "Apple plans a three-day flurry of announcements for new products.", "background": "Apple has invited the tech press to a 'special Apple experience' on March 4, indicating a shift from its standard press event format. The company is expected to announce several new products during this period, with events in major cities offering hands-on experiences.", "phase": 3}, "apple_0301": {"title": "Apple rolls out age-verification tools worldwide to comply with child safety laws.", "date": "2026-02-24", "action": "Apple rolls out age-verification tools worldwide to comply with child safety laws.", "background": "There is a growing number of age-verification laws both in the U.S. and internationally, requiring companies to ensure that certain apps are only accessible to adults. Governments have created these laws to block or restrict apps like social media that are intended for adult use only. Developers need technical solutions to comply with these regulations without accessing users' personal information.", "phase": 3}, "apple_0228": {"title": "Apple introduced the iPhone Air as a new model to explore hardware design and efficiency improvements.", "date": "2025-09-09", "action": "Apple introduced the iPhone Air as a new model to explore hardware design and efficiency improvements.", "background": "Apple is focused on advancing its hardware design and technology to address challenges like performance and battery life. The company is experimenting with its own silicon and new design architectures to optimize these aspects, which are crucial as mobile devices become more advanced in capabilities such as photography and AI.", "phase": 3}, "apple_0229": {"title": "Apple unveiled three new Apple Watch configurations.", "date": "2025-09-09", "action": "Apple unveiled three new Apple Watch configurations.", "background": "Apple holds an annual hardware event where it typically announces new products and updates to its existing product lines. This event is a key moment for Apple to showcase its latest technological advancements and maintain its competitive edge in the wearable technology market.", "phase": 3}, "apple_0231": {"title": "Apple announced its iPhone 17 lineup.", "date": "2025-09-12", "action": "Apple announced its iPhone 17 lineup.", "background": "Apple regularly updates its product offerings to maintain its competitive position in the smartphone market and meet consumer demand for new technology.", "phase": 3}, "apple_0234": {"title": "Apple issued security fixes to address vulnerabilities.", "date": "2025-09-16", "action": "Apple issued security fixes to address vulnerabilities.", "background": "There was an ongoing spyware campaign targeting phone users, prompting several phone software vendors to release security updates to protect their customers.", "phase": 3}, "apple_0235": {"title": "Apple developed and implemented a metal can battery technology in the iPhone Air.", "date": "2025-09-17", "action": "Apple developed and implemented a metal can battery technology in the iPhone Air.", "background": "Apple has been working on improving the design and efficiency of its devices, focusing on maximizing space and energy storage within its products. The company has a history of using innovative battery designs to enhance device performance and durability.", "phase": 3}, "apple_0236": {"title": "Apple blamed the EU's Digital Markets Act for delaying the launch of some features in the EU.", "date": "2025-09-25", "action": "Apple blamed the EU's Digital Markets Act for delaying the launch of some features in the EU.", "background": "The European Union's Digital Markets Act aims to regulate major tech platforms by enforcing interoperability and reducing anti-competitive behavior. This regulation requires companies to make their systems compatible with third-party devices and applications, which Apple argues conflicts with its commitment to user privacy and security.", "phase": 3}, "apple_0237": {"title": "Apple challenged the legal demand in court.", "date": "2025-10-01", "action": "Apple challenged the legal demand in court.", "background": "The UK government issued a secret order under the Investigatory Powers Act 2016, requesting access to encrypted iCloud data, which raised concerns among privacy activists about user privacy worldwide.", "phase": 3}, "apple_0240": {"title": "Apple introduced the Foundation Models framework to allow developers to use local AI models in their applications.", "date": "2025-10-03", "action": "Apple introduced the Foundation Models framework to allow developers to use local AI models in their applications.", "background": "Earlier this year, Apple held its annual Worldwide Developers Conference (WWDC) where it typically announces new technologies and tools for developers. The company has been focusing on enhancing its AI capabilities and providing developers with resources to integrate AI into their applications. This aligns with the broader industry trend of incorporating AI to improve app functionalities and user experiences.", "phase": 3}, "apple_0241": {"title": "Apple removed imposter apps from the App Store.", "date": "2025-10-09", "action": "Apple removed imposter apps from the App Store.", "background": "Following the launch of OpenAI's invite-only, video-generating mobile app, the App Store experienced a surge of fake apps attempting to capitalize on the popularity of the new AI video model. These apps used the 'Sora' brand name, which is trademarked by OpenAI, leading to potential consumer confusion and undermining the App Store's credibility.", "phase": 3}, "apple_0244": {"title": "Apple discontinued support for the Clips app.", "date": "2025-10-11", "action": "Apple discontinued support for the Clips app.", "background": "Clips was launched in 2017 as a video-editing app that allowed users to create videos with filters, emojis, and music. Despite initial updates, recent years saw limited enhancements, and the app's relevance diminished compared to newer technologies like generative AI video apps.", "phase": 3}, "apple_0245": {"title": "Apple plans to overhaul Siri and integrate AI capabilities into its ecosystem.", "date": "2025-10-11", "action": "Apple plans to overhaul Siri and integrate AI capabilities into its ecosystem.", "background": "The emergence of AI platforms like OpenAI's ChatGPT presents a competitive threat to traditional app ecosystems. Apple, with its large user base and control over hardware and software, is positioned to leverage its existing infrastructure to modernize app interactions and maintain its dominance in the app industry.", "phase": 3}, "apple_0246": {"title": "Apple signed contracts for 650 megawatts of renewable power in Europe and announced a $150 million investment in China for renewable energy.", "date": "2025-10-15", "action": "Apple signed contracts for 650 megawatts of renewable power in Europe and announced a $150 million investment in China for renewable energy.", "background": "Apple is focusing on reducing its carbon footprint, with a significant portion of its emissions coming from customer use of its products. The company is part of a broader trend among tech firms to secure renewable energy sources, which are cost-effective and quick to deploy, to power their operations and data centers.", "phase": 3}, "apple_0254": {"title": "Apple remains open to pursuing mergers and acquisitions to advance its AI roadmap.", "date": "2025-10-31", "action": "Apple remains open to pursuing mergers and acquisitions to advance its AI roadmap.", "background": "Apple is focusing on advancing its AI capabilities, including the development of next-generation AI-powered Siri and partnerships with AI technology providers. The company is actively monitoring the market for opportunities that align with its strategic goals in AI development.", "phase": 3}, "apple_0259": {"title": "Apple plans to develop and implement new satellite-powered features for iPhones.", "date": "2025-11-09", "action": "Apple plans to develop and implement new satellite-powered features for iPhones.", "background": "Apple is exploring ways to enhance the functionality of iPhones beyond traditional cellular networks, aiming to improve usability in areas with limited connectivity. The company is working with partners to expand infrastructure capabilities to support these advancements.", "phase": 3}, "apple_0261": {"title": "Apple launched Digital ID, allowing users to carry a copy of their U.S. passport on their devices for use at TSA checkpoints.", "date": "2025-11-12", "action": "Apple launched Digital ID, allowing users to carry a copy of their U.S. passport on their devices for use at TSA checkpoints.", "background": "Apple has been working on expanding the capabilities of its Wallet app to include more forms of identification. The company aims to make its devices more integral to daily life by replacing physical wallets with digital alternatives. This initiative is part of a broader trend towards digital transformation and increased convenience for users.", "phase": 3}, "apple_0265": {"title": "Apple plans to appeal the jury verdict.", "date": "2025-11-15", "action": "Apple plans to appeal the jury verdict.", "background": "A federal jury in California ruled that Apple must pay Masimo $634 million for infringing a patent related to blood oxygen-monitoring technology. The legal dispute involves accusations of patent infringement and employee poaching, with previous rulings affecting Apple's product features.", "phase": 3}, "apple_0266": {"title": "Apple is preparing for the possibility of CEO Tim Cook stepping down by engaging in succession planning.", "date": "2025-11-16", "action": "Apple is preparing for the possibility of CEO Tim Cook stepping down by engaging in succession planning.", "background": "The company is considering future leadership changes as Tim Cook has been CEO since 2011, and there is speculation about his potential departure. The board and senior executives are involved in discussions about leadership transition, with a focus on ensuring stability and continuity in Apple's strategic direction.", "phase": 3}, "apple_0268": {"title": "Apple launched Apple Music Replay 2025.", "date": "2025-12-02", "action": "Apple launched Apple Music Replay 2025.", "background": "The music streaming industry is highly competitive, with major players like Spotify, YouTube, and Amazon Music offering year-end features that summarize users' listening habits. These features are popular for their social media sharing potential and user engagement. Apple aims to enhance its music streaming service by providing similar features to attract and retain users.", "phase": 3}, "apple_0270": {"title": "Apple announced its annual list of App Store Award winners.", "date": "2025-12-04", "action": "Apple announced its annual list of App Store Award winners.", "background": "Each year, Apple evaluates apps and games to recognize those that stand out in terms of quality, innovation, and cultural impact. This process involves narrowing down a list of finalists to select winners across various categories, reflecting the company's commitment to highlighting excellence in app development.", "phase": 3}, "apple_0272": {"title": "Apple fought the specific terms of a court agreement regarding in-app purchase restrictions.", "date": "2025-12-11", "action": "Apple fought the specific terms of a court agreement regarding in-app purchase restrictions.", "background": "Epic Games had filed antitrust lawsuits against Apple and Google after their apps were removed from the stores for bypassing in-app payment systems. The court ruled that Apple was not a monopolist but needed to allow developers to point to other payment mechanisms. Apple has been involved in legal proceedings to address the terms of this ruling.", "phase": 3}, "apple_0274": {"title": "Apple released security updates for its flagship products.", "date": "2025-12-12", "action": "Apple released security updates for its flagship products.", "background": "There was a hacking campaign targeting users of major tech companies, with sophisticated attacks exploiting zero-day vulnerabilities. These attacks were potentially orchestrated by government-backed hackers, prompting a need for urgent security measures.", "phase": 3}, "apple_0277": {"title": "Apple paused app store changes in Texas after a court blocked an age-assurance law.", "date": "2025-12-24", "action": "Apple paused app store changes in Texas after a court blocked an age-assurance law.", "background": "A federal judge blocked Texas from implementing a new age-verification law for app stores, citing First Amendment concerns. The law would have required app stores to verify user ages and require parental consent for minors. Apple had previously announced plans to comply with this law, which was set to take effect in January, but had objected to it on privacy grounds.", "phase": 3}, "apple_0278": {"title": "Apple sends 'threat notifications' to users targeted by mercenary spyware.", "date": "2025-12-27", "action": "Apple sends 'threat notifications' to users targeted by mercenary spyware.", "background": "Journalists and human rights activists have been targeted by government spyware globally, leading to increased risks and the need for protective measures. Organizations like Access Now provide support to these individuals, and tech companies are involved in notifying users of potential threats.", "phase": 3}, "apple_0280": {"title": "Apple announced JPMorgan Chase as the new issuer of the Apple Card.", "date": "2026-01-07", "action": "Apple announced JPMorgan Chase as the new issuer of the Apple Card.", "background": "Apple had previously partnered with Goldman Sachs to launch its credit card in 2019. The partnership was designed to offer a credit card with no late fees or penalty interest rates, and it provided cash back on purchases. Over time, there were indications that the partnership might end, and JPMorgan was reported to be a potential new partner.", "phase": 3}, "apple_0281": {"title": "Apple paid $550 billion to developers through the App Store since 2008.", "date": "2026-01-12", "action": "Apple paid $550 billion to developers through the App Store since 2008.", "background": "Apple has been operating the App Store since 2008, and over the years, it has become a significant platform for developers to distribute their apps. The App Store takes a commission from in-app purchases, and this business model has been under regulatory scrutiny for potential monopolistic practices. Despite this, the platform has seen substantial growth in user engagement and financial transactions.", "phase": 3}, "apple_0284": {"title": "Apple revised its fee structure for apps operating under its business terms in the EU.", "date": "2026-01-20", "action": "Apple revised its fee structure for apps operating under its business terms in the EU.", "background": "The EU's Digital Markets Act prompted changes in business terms for app stores, leading to complex fee structures that affect developers' ability to plan and monetize their businesses effectively.", "phase": 3}, "apple_0288": {"title": "Apple plans to announce a new version of Siri using Google's Gemini AI models.", "date": "2026-01-25", "action": "Apple plans to announce a new version of Siri using Google's Gemini AI models.", "background": "Apple has been working on improving its AI capabilities and has formed a partnership with Google to enhance its services. The company has faced challenges in its AI strategy but is now moving in a new direction following the departure of its AI chief and the establishment of this partnership.", "phase": 3}, "apple_0289": {"title": "Apple introduced the next version of its AirTag with enhanced features.", "date": "2026-01-26", "action": "Apple introduced the next version of its AirTag with enhanced features.", "background": "Apple's AirTag, first launched in 2021, quickly dominated the market for Bluetooth-connected lost item finders, challenging previous market leaders and integrating with Apple's extensive ecosystem. The company continues to innovate and expand its product capabilities to maintain its competitive edge.", "phase": 3}, "apple_0293": {"title": "Apple acquired the Israeli startup Q.ai.", "date": "2026-01-29", "action": "Apple acquired the Israeli startup Q.ai.", "background": "Apple, along with other tech giants like Meta and Google, is engaged in a competitive race to lead advancements in AI technology, with a particular focus on enhancing hardware capabilities. The company has been integra function hl(text, keywords) {
  if (!keywords || keywords.length === 0) return escapeHtml(text);
  const sorted = [...keywords].sort((a, b) => b.length - a.length);
  const escaped = sorted.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');
  return escapeHtml(text).replace(re, '<b>$1</b>');
}
function escapeHtml(t) {
  return (t || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function attrEsc(t) { return (t || '').replace(/"/g, '&quot;'); }

const BRAND_OVERRIDES = {
  apple: 'Apple', openai: 'OpenAI', meta: 'Meta', amazon: 'Amazon', anthropic: 'Anthropic',
  google: 'Google', microsoft: 'Microsoft', tesla: 'Tesla', nvidia: 'Nvidia',
  cbs: 'CBS', bbc: 'BBC', abc: 'ABC', cnn: 'CNN', nbc: 'NBC',

  united_airlines: 'United Airlines', general_motors: 'General Motors',
  ufc: 'UFC', exxonmobil: 'ExxonMobil',
};
function deriveBrand() {
  const SOURCE_LABELS = { tc: 'TechCrunch', wiki: 'Wikipedia' };
  let raw = (location.pathname.split('/').filter(Boolean).pop() || '').replace('.html','');
  if (!raw) raw = (document.title || '').replace(/^CDT\s*[—-]\s*/i,'').trim();
  const m = raw.match(/^(.+?)_(tc|wiki)$/i);
  let key = raw, src = '';
  if (m) { key = m[1]; src = SOURCE_LABELS[m[2].toLowerCase()] || ''; }
  const lc = key.toLowerCase();
  let name = BRAND_OVERRIDES[lc];
  if (!name) {
    name = key.split(/[_\-\s]+/).map(w => w ? (w[0].toUpperCase() + w.slice(1)) : '').join(' ');
  }
  return src ? `${name} · ${src}` : name || 'CDT Visualization';
}

  pn = pn.replace(/^[\w_]+\s+phase\s*\d+\s*$/i, '');  // wiki-style "Nintendo phase 0" → ""
  const meta = (phase.date_range && phase.date_range !== pn) ? (pn ? `${pn} · ${phase.date_range}` : phase.date_range) : pn;
  secPhases.append("button")
    .attr("class", "phase-btn")
    .attr("data-idx", i)
    .html(`
      <div class="phase-name">Phase ${i}</div>
      <div class="phase-meta">${escapeHtml(meta)}</div>
      <div class="phase-actions">
        ${m ? `<span class="pa modify">${m} modify</span>` : ''}
        ${a ? `<span class="pa add">${a} add</span>` : ''}
        ${d ? `<span class="pa delete">${d} delete</span>` : ''}
      </div>`)
    .on("click", function() { clearCase(); selectPhase(i); });
});

// CASES section
if (caseStudies.length > 0) {
  const secCases = controls.append("div").attr("class", "section");
  secCases.append("div").attr("class", "panel-title").text("Case studies");
  caseStudies.forEach((cs, i) => {
    const sB = cs.base.score, sBC = cs.base_cdt.score, sA = cs.adapted_cdt.score;
    const ev = eventsData[cs.event_id] || {};
    const action = (cs.reference || ev.action || '').slice(0, 110);
    secCases.append("button")
      .attr("class", "case-btn")
      .attr("data-case-idx", i)
      .html(`
        <span class="case-eid">${escapeHtml(cs.event_id)}</span><span class="case-tag">P${cs.phase}</span>

        <div class="case-scores">
          ${HIDE_ADAPTED_PRED
            ? `<span class="score-chip s-${sBC}">base CDT: ${scoreLabel(sBC)}</span>`
            : `<span class="score-chip s-${sBC}">${scoreLabel(sBC)}</span><span class="arrow">→</span><span class="score-chip s-${sA}">${scoreLabel(sA)}</span>`}

function selectPhase(idx) {
  activePhaseIdx = idx;
  controls.selectAll(".phase-btn").classed("active", function() {
    return +this.getAttribute("data-idx") === idx;
  });
  activeActions = {};
  if (idx >= 0 && idx < adapterPhases.length) {
    adapterPhases[idx].actions.forEach(a => {
      (activeActions[a.node_id] = activeActions[a.node_id] || []).push(a);
    });
  }
  renderPies();
}

// ===== Case selection =====
function selectCase(idx) {
  activeCaseIdx = idx;
  controls.selectAll(".case-btn").classed("active", function() {
    return +this.getAttribute("data-case-idx") === idx;
  });
  controls.selectAll(".phase-btn").classed("active", false);
  activeActions = {};
  const cs = caseStudies[idx];
  const act = caseActivations[idx];
  highlightCaseNodes(act);
  showCasePanel(cs, act);
}
function clearCase() {
  activeCaseIdx = -1;
  controls.selectAll(".case-btn").classed("active", false);
  closeDrawer('#case-panel');
  g.selectAll("g.node")
    .classed("node-glow-base", false)
    .classed("node-glow-adapted", false)
    .classed("node-glow-both", false)
    .classed("node-dimmed", false);
  g.selectAll("path.link").classed("link-dimmed", false);
}
function highlightCaseNodes(act) {
  const baseIds = new Set(act.base_cdt.activated_node_ids);
  const adaptedIds = HIDE_ADAPTED_PRED ? new Set() : new Set(act.adapted_cdt.activated_node_ids);
  const allActive = new Set([...baseIds, ...adaptedIds]);
  g.selectAll("g.node").each(function(d) {
    const el = d3.select(this);
    const nid = d.data.node_id;
    el.classed("node-dimmed", !allActive.has(nid));
    el.classed("node-glow-both", baseIds.has(nid) && adaptedIds.has(nid));
    el.classed("node-glow-base", baseIds.has(nid) && !adaptedIds.has(nid));
    el.classed("node-glow-adapted", !baseIds.has(nid) && adaptedIds.has(nid));
  });
  g.selectAll("path.link").classed("link-dimmed", true);
}

// ===== NODE PANEL =====
function showNodePanel(d) {
  closeDrawer('#case-panel'); closeDrawer('#stmt-panel');
  const p = d3.select("#node-panel");
  const nid = d.data.node_id;
  const ne = nodeEventsData[nid] || { event_ids: [], statements_by_source: {}, n_events: 0 };
  // Title: prefer branded name (Root → "<Brand>'s behavior"), then friendly name, then node id
  const branded = brandedName(d);
  const title = (branded && branded !== nid) ? branded : `Node ${nid}`;

  let html = drawerHeader(nid, title);
  html += `<div class="drawer-body">`;
  if (d.data.gate) {
    html += `<div class="drawer-section">
      <div class="label">Gate question</div>
      <div class="body" style="color:var(--accent);">${hl(d.data.gate, d.data.gate_keywords)}</div>
    </div>`;
  }

  // Statements at this node (from base + each phase if different)
  const bySource = ne.statements_by_source || {};
  const allStmts = new Map(); // text -> {sources:[], n_yes_max}
  Object.entries(bySource).forEach(([src, list]) => {
    list.forEach(s => {
      if (!allStmts.has(s.text)) allStmts.set(s.text, {sources:[], n_yes:0});
      const e = allStmts.get(s.text);
      e.sources.push(src);
      e.n_yes = Math.max(e.n_yes, s.n_yes || 0);
    });
  });
  if (allStmts.size > 0) {
    html += `<div class="drawer-section">
      <div class="label">Statements at this node (${allStmts.size})</div>`;
    [...allStmts.entries()].forEach(([text, info]) => {
      const sourceLabels = info.sources.map(s => s === 'base' ? 'base' : s.replace('phase_','P')).join(', ');
      html += `<div class="stmt-card">
        <div class="text" data-stmt="${attrEsc(text)}">${escapeHtml(text)}</div>
        <div class="meta">
          <span class="pill">${escapeHtml(sourceLabels)}</span>

        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Aggregated events — prefer cluster view (semantic groups with up to 5 reps each)
  // and fall back to flat date-sorted list when no clusters exist for this node.
  if (ne.event_ids && ne.event_ids.length > 0) {
    const clusters = ne.clusters;
    if (clusters && clusters.length > 0) {
      html += `<div class="drawer-section">
        <div class="label">Events grouped by theme (${ne.event_ids.length} total in ${clusters.length} themes)</div>
        <div class="cluster-list">`;
      clusters.forEach((c, ci) => {
        const reps = c.rep_event_ids || [];

        html += `<div class="cluster-card">
          <div class="cluster-head">
            <span class="cluster-label">${escapeHtml(c.label)}</span>
            <span class="cluster-count">${c.n_total} events</span>
          </div>
          <div class="cluster-reps">`;
        reps.forEach(eid => {
          const e = eventsData[eid] || {};
          html += `<div class="event-row mini">
            <div class="top">
              <span class="eid">${escapeHtml(eid)}</span>
              ${e.phase != null ? `<span class="phase-tag">P${e.phase}</span>` : ''}
              <span>${escapeHtml(e.date || '')}</span>
            </div>
            ${e.action ? `<div class="action">${escapeHtml(e.action)}</div>` : ''}
          </div>`;
        });
        if (hidden > 0) {
          html += `<div class="cluster-more">+ ${hidden} more similar event${hidden === 1 ? '' : 's'} in this theme</div>`;
        }
        html += `</div></div>`;
      });
      html += `</div></div>`;
    } else {
      // Fallback: flat list (only used for nodes the clusterer skipped)
      html += `<div class="drawer-section">
        <div class="label">Events covered (${ne.event_ids.length}, sorted by date)</div>
        <div class="event-list">`;
      ne.event_ids.forEach(eid => {
        const e = eventsData[eid] || {};
        html += `<div class="event-row">
          <div class="top">
            <span class="eid">${escapeHtml(eid)}</span>

          ${e.background ? `<div class="bg">${escapeHtml(e.background)}</div>` : ''}

      });
      html += `</div></div>`;
    }

    html += `<div class="drawer-section"><div class="body muted" style="font-style:italic;">No events covered by statements at this node.</div></div>`;
  }

  html += `</div>`;

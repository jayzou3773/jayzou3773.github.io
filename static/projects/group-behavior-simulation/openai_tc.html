<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CDT — openai_tc</title>
<style>
  /* ===== Design tokens ===== */
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --ink: #1a1d23;
    --ink-soft: #5d6470;
    --ink-faint: #9098a3;
    --line: #e6e2d6;
    --line-soft: #f0ece0;
    --accent: #ff5d3b;        /* Dutch orange */
    --accent-soft: #ffece5;
    --base: #1d6fe0;          /* base CDT */
    --base-soft: #e8f1ff;
    --adapt: #5e35b1;         /* adapted CDT */
    --adapt-soft: #efe8f7;
    --add: #2e8b57;
    --add-soft: #e0f1e8;
    --modify: #d97706;
    --modify-soft: #fdf1d9;
    --delete: #dc2626;
    --delete-soft: #fce4e4;
    --shadow: 0 1px 3px rgba(15, 20, 30, 0.06), 0 8px 24px rgba(15, 20, 30, 0.06);
    --radius: 12px;
    --radius-sm: 8px;
    --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans); margin: 0; background: var(--bg); color: var(--ink);
    overflow: hidden; -webkit-font-smoothing: antialiased; line-height: 1.5;
  }
  .main-svg { width: 100vw; height: 100vh; cursor: grab; }
  .main-svg:active { cursor: grabbing; }

  /* ===== Tree links ===== */
  .link {
    fill: none; stroke: #c9c2ad; stroke-width: 1.5px; opacity: 0.85;
    transition: opacity 0.25s, stroke 0.25s, stroke-width 0.25s;
  }
  .link.link-dimmed { opacity: 0.1; }
  .link.link-active { stroke: var(--accent); stroke-width: 2.5px; opacity: 1; }

  /* ===== Tree nodes ===== */
  .node { cursor: pointer; }
  .node circle, .node .pie-slice {
    transition: filter 0.2s, opacity 0.25s, stroke-width 0.2s;
  }
  .node text {
    font-family: var(--font-sans); font-size: 11px; font-weight: 500;
    fill: var(--ink); pointer-events: none;
    paint-order: stroke; stroke: var(--bg); stroke-width: 3.5px; stroke-linejoin: round;
  }
  .node text.node-label-secondary {
    font-size: 10px; fill: var(--ink-faint); font-weight: 400;
  }
  .node.node-dimmed circle, .node.node-dimmed .pie-slice { opacity: 0.18; }
  .node.node-dimmed text { opacity: 0.35; }

  /* glow rings instead of CSS filter (clearer on large trees) */
  .glow-ring { fill: none; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .node.node-glow-base    .glow-ring.gr-base    { opacity: 1; stroke: var(--base);  stroke-width: 2.5px; }
  .node.node-glow-adapted .glow-ring.gr-adapt   { opacity: 1; stroke: var(--adapt); stroke-width: 2.5px; }
  .node.node-glow-both    .glow-ring.gr-base    { opacity: 1; stroke: var(--base);  stroke-width: 2.5px; }
  .node.node-glow-both    .glow-ring.gr-adapt   { opacity: 1; stroke: var(--adapt); stroke-width: 2.5px; }

  /* event count badge on node */
  .event-badge {
    pointer-events: none; opacity: 0.95;
  }
  .event-badge rect {
    fill: var(--ink); rx: 8;
  }
  .event-badge text {
    fill: #fff; font-size: 9px; font-weight: 700;
    paint-order: normal; stroke: none;
  }

  /* ===== Header bar ===== */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    background: rgba(255,255,255,0.88); backdrop-filter: saturate(1.4) blur(10px);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; padding: 0 18px; z-index: 6;
  }
  #topbar .brand {
    font-weight: 700; letter-spacing: -0.01em; font-size: 14px;
  }
  #topbar .brand .accent-bar {
    display: inline-block; width: 14px; height: 14px; background: var(--accent);
    border-radius: 3px; vertical-align: -2px; margin-right: 8px;
  }
  #topbar .crumbs {
    color: var(--ink-faint); font-size: 12px; margin-left: 12px;
    border-left: 1px solid var(--line); padding-left: 12px;
  }
  #topbar .right { margin-left: auto; display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--ink-faint); }
  #topbar .legend-pill {
    display: inline-flex; gap: 4px; align-items: center;
    padding: 3px 8px; border: 1px solid var(--line); border-radius: 999px;
    background: #fff;
  }
  #topbar .legend-pill .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  }

  /* ===== Side controls ===== */
  #controls {
    position: absolute; top: 60px; left: 12px; z-index: 5;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 8px; box-shadow: var(--shadow);
    width: 200px; max-height: calc(100vh - 80px); overflow-y: auto;
    display: flex; flex-direction: column; gap: 6px;
  }
  #controls .panel-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint); margin: 0 0 4px;
  }
  #controls .section { display: flex; flex-direction: column; gap: 4px; }
  #controls .phase-btn, #controls .case-btn {
    display: block; width: 100%; text-align: left;
    padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer;
    border: 1px solid var(--line); background: #fff;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
    color: var(--ink); font-family: inherit; font-size: 10.5px;
  }
  #controls .phase-btn:hover, #controls .case-btn:hover { border-color: var(--ink-faint); }
  #controls .phase-btn:active, #controls .case-btn:active { transform: translateY(1px); }
  #controls .phase-btn .phase-name { font-weight: 600; line-height: 1.2; font-size: 10.5px; word-wrap: break-word; }
  #controls .phase-btn .phase-meta { font-size: 9px; color: var(--ink-faint); margin-top: 3px; word-wrap: break-word; }
  #controls .phase-btn .phase-actions { font-size: 9px; margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
  #controls .phase-btn .pa { display: inline-flex; align-items: center; gap: 2px; padding: 1px 4px; border-radius: 4px; font-weight: 600; }
  #controls .phase-btn .pa.modify { background: var(--modify-soft); color: var(--modify); }
  #controls .phase-btn .pa.add    { background: var(--add-soft);    color: var(--add); }
  #controls .phase-btn .pa.delete { background: var(--delete-soft); color: var(--delete); }
  #controls .phase-btn.active {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  #controls .phase-btn.active .phase-meta { color: rgba(255,255,255,0.7); }
  #controls .phase-btn.active .pa { background: rgba(255,255,255,0.16); color: #fff; }

  #controls .case-btn { border-left: 3px solid var(--adapt); }
  #controls .case-btn .case-eid { font-weight: 700; font-family: var(--font-mono); font-size: 9.5px; }
  #controls .case-btn .case-tag { font-size: 10px; color: var(--ink-faint); margin-left: 4px; }
  #controls .case-btn .case-action { font-size: 9.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.35; word-wrap: break-word; }
  #controls .case-btn .case-scores { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; align-items: center; }
  #controls .case-btn .score-chip {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; text-align: center;
    color: #fff; letter-spacing: 0.02em;
  }
  #controls .case-btn .score-chip.s-0 { background: var(--delete); }
  #controls .case-btn .score-chip.s-50 { background: var(--modify); }
  #controls .case-btn .score-chip.s-100 { background: var(--add); }
  #controls .case-btn .arrow { color: var(--ink-faint); font-weight: 400; align-self: center; font-size: 11px; }
  #controls .case-btn.active {
    background: var(--adapt-soft); border-color: var(--adapt);
  }

  /* ===== Tooltip (hover quick info) ===== */
  #tooltip {
    position: absolute; padding: 12px 14px; background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--radius-sm);
    box-shadow: var(--shadow); max-width: 460px; min-width: 280px;
    font-size: 12.5px; line-height: 1.5; pointer-events: auto; display: none; z-index: 9;
  }
  #tooltip .nid {
    display: inline-block; font-family: var(--font-mono); font-size: 10px;
    background: var(--ink); color: #fff; padding: 1px 7px; border-radius: 4px;
    font-weight: 600; letter-spacing: 0.02em;
  }
  #tooltip .gate {
    color: var(--accent); font-weight: 600; margin-top: 6px; font-size: 12px; line-height: 1.4;
  }
  #tooltip .ev-pill {
    display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent); font-weight: 600; margin-left: 6px;
  }
  #tooltip .stmt {
    color: var(--ink); margin: 5px 0 0; padding: 5px 8px; border-radius: 5px;
    background: var(--line-soft); cursor: pointer; transition: background 0.15s;
    font-size: 10.5px;
  }
  #tooltip .stmt:hover { background: var(--accent-soft); }
  #tooltip .stmt b { color: var(--accent); font-weight: 700; }
  #tooltip .empty { color: var(--ink-faint); font-style: italic; font-size: 12px; margin-top: 4px; }
  #tooltip .adapter-section { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
  #tooltip .adapter-action {
    font-weight: 700; font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase;
    margin-top: 6px;
  }
  #tooltip .adapter-action.modify { color: var(--modify); }
  #tooltip .adapter-action.delete { color: var(--delete); }
  #tooltip .adapter-action.add    { color: var(--add); }
  #tooltip .old-stmt {
    color: var(--ink-faint); text-decoration: line-through;
    margin: 3px 0; padding: 4px 8px; background: var(--delete-soft); border-radius: 4px;
    font-size: 11.5px; cursor: pointer;
  }
  #tooltip .new-stmt {
    color: var(--ink); margin: 3px 0; padding: 4px 8px;
    background: var(--add-soft); border-radius: 4px; font-size: 11.5px; cursor: pointer;
  }
  #tooltip .coverage { color: var(--ink-faint); font-size: 10.5px; margin-top: 3px; }
  #tooltip .open-panel-cta {
    display: block; margin-top: 10px; padding: 6px 10px;
    background: var(--ink); color: #fff; text-align: center; border-radius: 6px;
    font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.02em;
  }
  #tooltip .open-panel-cta:hover { background: var(--accent); }

  /* ===== Right-side drawers ===== */
  .drawer {
    position: absolute; top: 0; right: 0; height: 100vh;
    background: var(--surface); border-left: 1px solid var(--line);
    z-index: 8; display: none; box-shadow: -8px 0 24px rgba(15,20,30,0.06);
    overflow: hidden; flex-direction: column;
  }
  .drawer.open { display: flex; }

  #node-panel { width: 540px; }
  #stmt-panel { width: 720px; }
  #case-panel { width: 920px; }

  .drawer-header {
    flex: 0 0 auto; padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
  }
  .drawer-header .head-tag {
    font-family: var(--font-mono); font-size: 10.5px; padding: 2px 8px;
    border-radius: 4px; font-weight: 700; letter-spacing: 0.04em;
    background: var(--ink); color: #fff;
  }
  .drawer-header h3 {
    margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
    flex: 1; word-break: break-word;
  }
  .drawer-header .close-x {
    border: 0; background: transparent; cursor: pointer; font-size: 22px;
    color: var(--ink-faint); padding: 0 4px; line-height: 1;
  }
  .drawer-header .close-x:hover { color: var(--ink); }
  .drawer-body { flex: 1 1 auto; overflow-y: auto; padding: 0; }

  .drawer-section { padding: 14px 18px; border-bottom: 1px solid var(--line-soft); }
  .drawer-section:last-child { border-bottom: 0; }
  .drawer-section .label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 8px;
  }
  .drawer-section .body { font-size: 13px; line-height: 1.55; color: var(--ink); word-wrap: break-word; }
  .drawer-section .body.muted { color: var(--ink-soft); }
  .drawer-section .body b { color: var(--accent); font-weight: 600; }

  /* === node panel specifics === */
  #node-panel .stmt-card {
    border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px 12px;
    margin-bottom: 8px; background: #fff;
  }
  #node-panel .stmt-card .text { font-size: 12.5px; color: var(--ink); cursor: pointer; }
  #node-panel .stmt-card .text:hover { color: var(--accent); }
  #node-panel .stmt-card .meta {
    font-size: 10.5px; color: var(--ink-faint); margin-top: 5px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  #node-panel .stmt-card .meta .pill {
    background: var(--line-soft); color: var(--ink-soft);
    padding: 1px 7px; border-radius: 4px; font-weight: 600;
  }
  #node-panel .event-list { max-height: 400px; overflow-y: auto; }
  #node-panel .event-row {
    padding: 6px 8px; border: 1px solid var(--line); border-radius: var(--radius-sm);
    margin-bottom: 6px; background: #fff;
  }
  #node-panel .event-row.mini { padding: 7px 10px; margin-bottom: 5px; }
  #node-panel .event-row .top {
    display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--ink-faint);
  }
  #node-panel .event-row .eid {
    font-family: var(--font-mono); font-weight: 700; color: var(--ink);
  }
  #node-panel .event-row .phase-tag {
    background: var(--base-soft); color: var(--base);
    padding: 1px 6px; border-radius: 3px; font-weight: 700; font-size: 10px;
  }
  #node-panel .event-row .action { font-size: 12.5px; color: var(--ink); margin-top: 4px; }
  #node-panel .event-row .bg { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }

  /* Cluster cards */
  #node-panel .cluster-list { display: flex; flex-direction: column; gap: 12px; }
  #node-panel .cluster-card {
    border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; overflow: hidden;
  }
  #node-panel .cluster-card .cluster-head {
    display: flex; gap: 8px; align-items: center;
    padding: 10px 12px;
    background: linear-gradient(180deg, #fffaf3, #fff);
    border-bottom: 1px solid var(--line-soft);
  }
  #node-panel .cluster-card .cluster-label {
    flex: 1;
    font-size: 12.5px; font-weight: 700; color: var(--ink);
    line-height: 1.35;
  }
  #node-panel .cluster-card .cluster-count {
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
    color: var(--accent); background: var(--accent-soft);
    padding: 2px 8px; border-radius: 999px; white-space: nowrap;
  }
  #node-panel .cluster-card .cluster-reps {
    padding: 8px 10px;
  }
  #node-panel .cluster-card .cluster-more {
    margin-top: 4px; padding: 4px 8px;
    font-size: 11px; color: var(--ink-faint); font-style: italic;
    background: var(--line-soft); border-radius: 4px; text-align: center;
  }

  /* === statement panel === */
  #stmt-panel .stmt-text {
    font-size: 14px; color: var(--ink); padding: 14px 18px; line-height: 1.55;
    background: var(--accent-soft); border-bottom: 1px solid var(--line-soft);
  }
  #stmt-panel .gate-row {
    padding: 12px 18px; background: #fffaf6; border-bottom: 1px solid var(--line-soft);
    font-size: 12px; color: var(--ink-soft); line-height: 1.45;
  }
  #stmt-panel .gate-row .gate-label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 4px;
  }
  #stmt-panel .ev-section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    margin: 14px 18px 8px; color: var(--ink-faint);
  }
  #stmt-panel .ev-section-label .count { color: var(--ink); margin-left: 4px; }
  #stmt-panel .ev-section-label.yes { color: var(--add); }
  #stmt-panel .ev-section-label.no { color: var(--delete); }
  #stmt-panel .ev-card {
    margin: 0 18px 8px; padding: 10px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: #fff; border-left-width: 4px;
  }
  #stmt-panel .ev-card.yes-card { border-left-color: var(--add); }
  #stmt-panel .ev-card.no-card { border-left-color: var(--delete); }
  #stmt-panel .ev-card .top {
    display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--ink-faint);
  }
  #stmt-panel .ev-card .eid { font-family: var(--font-mono); font-weight: 700; color: var(--ink); }
  #stmt-panel .ev-card .phase-tag {
    background: var(--base-soft); color: var(--base); padding: 1px 6px; border-radius: 3px;
    font-weight: 700; font-size: 10px;
  }
  #stmt-panel .ev-card .action { font-size: 12.5px; color: var(--ink); margin-top: 5px; }
  #stmt-panel .ev-card .bg { font-size: 11.5px; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }

  /* Statement-panel cluster blocks (semantic grouping of supporting events) */
  #stmt-panel .stmt-cluster {
    margin: 0 18px 14px; border: 1px solid var(--line); border-radius: var(--radius);
    background: #fff; overflow: hidden;
  }
  #stmt-panel .stmt-cluster-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    background: linear-gradient(180deg, #f3fbf6, #fff);
    border-bottom: 1px solid var(--line-soft);
  }
  #stmt-panel .stmt-cluster-label {
    flex: 1; font-size: 12.5px; font-weight: 700; color: var(--ink); line-height: 1.35;
  }
  #stmt-panel .stmt-cluster-count {
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
    color: var(--add); background: var(--add-soft);
    padding: 2px 8px; border-radius: 999px; white-space: nowrap;
  }
  #stmt-panel .stmt-cluster-reps { padding: 10px 12px; }
  #stmt-panel .stmt-cluster-reps .ev-card { margin: 0 0 8px; }
  #stmt-panel .stmt-cluster-reps .ev-card:last-child { margin-bottom: 0; }
  #stmt-panel .stmt-cluster-others {
    padding: 10px 12px; border-top: 1px dashed var(--line);
    font-size: 11px; color: var(--ink-soft); line-height: 1.7;
  }
  #stmt-panel .stmt-cluster-others-label {
    font-weight: 600; color: var(--ink-faint); display: block; margin-bottom: 4px;
  }
  #stmt-panel .stmt-cluster-other-eid {
    display: inline-block; font-family: var(--font-mono); font-size: 10.5px;
    padding: 1px 7px; margin: 2px 4px 2px 0; border: 1px solid var(--line);
    border-radius: 999px; background: #fafaf7; color: var(--ink);
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  #stmt-panel .stmt-cluster-other-eid:hover { background: var(--accent-soft); border-color: var(--accent); }
  #stmt-panel .stmt-cluster-other-card { margin-top: 6px; }
  #stmt-panel .stmt-cluster-other-card .ev-card { margin: 0; }
  #stmt-panel .borrowed-note {
    margin: 0 18px 10px; padding: 8px 12px;
    background: #fffaf3; border-left: 3px solid var(--modify);
    border-radius: 4px; font-size: 11.5px; color: var(--ink-soft); line-height: 1.5;
  }

  /* === case panel === */
  #case-panel .pred-card {
    margin: 0 18px 10px; padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--line); background: #fff;
  }
  #case-panel .pred-card .pc-head {
    display: flex; align-items: center; gap: 8px; font-size: 11px;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-faint);
  }
  #case-panel .pred-card.base    .pc-head .name-pill { color: #fff; background: var(--ink-faint); }
  #case-panel .pred-card.basecdt .pc-head .name-pill { color: #fff; background: var(--base); }
  #case-panel .pred-card.adapted .pc-head .name-pill { color: #fff; background: var(--adapt); }
  #case-panel .pred-card .name-pill { padding: 2px 8px; border-radius: 4px; }
  #case-panel .score-badge {
    margin-left: auto; font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 999px; color: #fff;
  }
  #case-panel .score-badge.s-0 { background: var(--delete); }
  #case-panel .score-badge.s-50 { background: var(--modify); }
  #case-panel .score-badge.s-100 { background: var(--add); }
  #case-panel .pred-text { margin-top: 8px; font-size: 13px; color: var(--ink); line-height: 1.55; }
  #case-panel .pred-reason {
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--line);
    font-size: 11.5px; color: var(--ink-soft); line-height: 1.5;
  }
  #case-panel .stmt-counts {
    font-size: 11.5px; color: var(--ink-soft); margin: 10px 18px 6px;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  #case-panel .stmt-counts b { color: var(--ink); }

  #case-panel .compare-cols { display: flex; gap: 10px; padding: 0 18px 18px; }
  #case-panel .compare-col {
    flex: 1; min-width: 0;
    border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px;
    background: #fff;
  }
  #case-panel .col-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  #case-panel .col-title.base    { color: var(--base); }
  #case-panel .col-title.adapted { color: var(--adapt); }
  #case-panel .stmt-item {
    font-size: 12px; color: var(--ink); margin: 4px 0; padding: 6px 8px;
    border-radius: 5px; line-height: 1.45; cursor: pointer;
    word-wrap: break-word;
  }
  #case-panel .stmt-item.shared       { background: var(--line-soft); }
  #case-panel .stmt-item.only-base    { background: var(--base-soft);  border-left: 3px solid var(--base); }
  #case-panel .stmt-item.only-adapted { background: var(--adapt-soft); border-left: 3px solid var(--adapt); }
  #case-panel .stmt-item:hover { outline: 1px solid var(--accent); }

  /* ===== Loading ===== */
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 14px; color: var(--ink-faint);
  }
</style>
</head>

  <div class="right">

    <span class="legend-pill"><span class="dot" style="background:#5e35b1"></span> adapted</span>
    <span class="legend-pill"><span class="dot" style="background:#d97706"></span> modify</span>

    <span class="legend-pill"><span class="dot" style="background:#dc2626"></span> delete</span>

</div>

oing a corporate restructuring to become a public benefit corporation while maintaining control by its nonprofit division.", "phase": 1}, "openai_0165": {"title": "OpenAI decided that its nonprofit division will retain control over its for-profit organization.", "date": "2025-05-10", "action": "OpenAI decided that its nonprofit division will retain control over its for-profit organization.", "background": "OpenAI initially announced plans to convert to a for-profit organization. However, after engaging in dialogue with civic leaders and the offices of the Attorney General of Delaware and California, the company reconsidered its approach.", "phase": 1}, "openai_0166": {"title": "OpenAI increased its enterprise customer base for AI products.", "date": "2025-05-10", "action": "OpenAI increased its enterprise customer base for AI products.", "background": "The enterprise market for AI is large and growing, with businesses increasingly adopting AI tools and platforms. Competitors in the AI space are struggling to match the pace of adoption seen by OpenAI, as evidenced by transaction data from fintech firms. OpenAI has been reporting significant growth in business users and is projecting substantial revenue increases in the coming years.", "phase": 1}, "openai_0170": {"title": "OpenAI pledges to publish AI safety test results more often.", "date": "2025-05-14", "action": "OpenAI pledges to publish AI safety test results more often.", "background": "OpenAI has faced criticism from ethicists for allegedly rushing safety testing of certain models and not releasing technical reports. There have been incidents where updates to models like ChatGPT led to problematic behavior, prompting OpenAI to consider changes to its processes. The company aims to increase transparency and support community efforts in AI safety.", "phase": 1}, "openai_0171": {"title": "OpenAI is considering building data centers in the United Arab Emirates.", "date": "2025-05-14", "action": "OpenAI is conside ject required significant data center capacity, and there was speculation about which company would need such extensive services. Oracle had previously disclosed a major cloud deal in an SEC filing, which led to increased interest and speculation in the industry.", "phase": 1}, "openai_0210": {"title": "OpenAI partnered with Google Cloud for cloud computing resources.", "date": "2025-07-23", "action": "OpenAI partnered with Google Cloud for cloud computing resources.", "background": "OpenAI faces constraints in accessing Nvidia GPUs, which are essential for training and serving AI models. This has created tension with its primary cloud partner, Microsoft, prompting OpenAI to seek additional computational resources from other cloud providers.", "phase": 1}, "openai_0213": {"title": "OpenAI launched Study Mode in ChatGPT.", "date": "2025-07-29", "action": "OpenAI launched Study Mode in ChatGPT.", "background": "OpenAI has been addressing concerns about the impact of ChatGPT on students' critical thinking skills. The widespread use of ChatGPT in educational settings led to initial bans by some schools, but these have been reconsidered over time. OpenAI aims to improve ChatGPT as a learning tool, responding to studies indicating potential negative effects on brain activity when students use AI for assignments.", "phase": 2}, "openai_0215": {"title": "OpenAI raised $8.3 billion at a $300 billion valuation.", "date": "2025-08-01", "action": "OpenAI raised $8.3 billion at a $300 billion valuation.", "background": "OpenAI is experiencing impressive growth, with significant increases in revenue and user engagement. The company is in the process of executing a broader strategy to secure $40 billion in funding this year, driven by strong investor interest and strategic partnerships.", "phase": 2}, "openai_0218": {"title": "OpenAI launched two open-weight AI reasoning models.", "date": "2025-08-05", "action": "OpenAI launched two open-weight AI reasoning models.", "background":  AI shopping feature in ChatGPT ahead of the peak holiday shopping window.", "background": "OpenAI has been facing increasing competition in the AI space, particularly from companies like Google and Anthropic. The company has been focusing on expanding its AI tools and features to attract more enterprise customers and enhance user experience. This strategic move is part of OpenAI's broader effort to develop AI-driven e-commerce tools.", "phase": 3}, "openai_0359": {"title": "OpenAI is hiring a new Head of Preparedness.", "date": "2025-12-28", "action": "OpenAI is hiring a new Head of Preparedness.", "background": "OpenAI has been focusing on addressing emerging AI-related risks, including those related to computer security and mental health. The company has a preparedness framework to track and prepare for frontier capabilities that could create new risks of severe harm. There have been changes in the leadership of the preparedness team, and the company has updated its framework to potentially adjust safety requirements in response to competitors' actions.", "phase": 3}, "openai_0360": {"title": "OpenAI raised $40 billion at a $300 billion valuation.", "date": "2025-12-29", "action": "OpenAI raised $40 billion at a $300 billion valuation.", "background": "In early 2025, the AI industry was experiencing a period of extreme optimism and high valuations, with significant investments being made in AI companies. This environment was characterized by large-scale funding rounds and infrastructure spending, as companies sought to justify their valuations and build the necessary infrastructure to support their operations.", "phase": 3}, "openai_0361": {"title": "OpenAI unified several engineering, product, and research teams to overhaul its audio models.", "date": "2026-01-01", "action": "OpenAI unified several engineering, product, and research teams to overhaul its audio models.", "background": "The tech industry is shifting towards audio interfaces as screens become less ts and Microsoft's involvement in the restructuring.", "phase": 3}, "openai_0371": {"title": "OpenAI hired several key employees from other companies.", "date": "2026-01-15", "action": "OpenAI hired several key employees from other companies.", "background": "The AI industry is experiencing a high turnover rate, with employees frequently moving between companies. OpenAI is actively involved in this competitive environment, seeking to strengthen its team amidst ongoing talent shifts.", "phase": 3}, "openai_0372": {"title": "OpenAI invested in Merge Labs.", "date": "2026-01-15", "action": "OpenAI invested in Merge Labs.", "background": "Merge Labs is a startup focused on developing brain computer interfaces to bridge biological and artificial intelligence. The company aims to create noninvasive technologies that connect with neurons, potentially enhancing human capabilities and interaction with AI. The investment aligns with OpenAI's interest in advancing AI technologies and exploring new frontiers in human-AI interaction.", "phase": 3}, "openai_0379": {"title": "OpenAI reorganized its leadership to focus on selling AI to business customers.", "date": "2026-01-22", "action": "OpenAI reorganized its leadership to focus on selling AI to business customers.", "background": "OpenAI is facing increased competition in the enterprise AI market, with its market share declining as rivals like Anthropic and Google gain ground. The company is focusing on enterprise growth as a strategic priority for 2026, aiming to regain its competitive position.", "phase": 3}, "openai_0380": {"title": "OpenAI plans to host closed-door meetings and an event in New Delhi.", "date": "2026-01-23", "action": "OpenAI plans to host closed-door meetings and an event in New Delhi.", "background": "India is hosting its first major AI event, attracting global technology leaders and highlighting the country's emergence as a key growth market for American AI companies. OpenAI has been expanding its presenc function hl(text, keywords) {
  if (!keywords || keywords.length === 0) return escapeHtml(text);
  const sorted = [...keywords].sort((a, b) => b.length - a.length);
  const escaped = sorted.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');
  return escapeHtml(text).replace(re, '<b>$1</b>');
}
function escapeHtml(t) {
  return (t || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function attrEsc(t) { return (t || '').replace(/"/g, '&quot;'); }

// ===== Main =====
function init(treeData, adapterPhases, caseStudies, caseActivations, eventsData, coverageData, nodeEventsData, metaData) {

const META = metaData || {};
const HIDE_ADAPTED_PRED = !!META.hide_adapted_pred;

// NLI eval labels: 0 → contradicts, 50 → neutral, 100 → entails
function scoreLabel(s) {
  if (s >= 100) return 'entails';
  if (s >= 50)  return 'neutral';
  return 'contradicts';
}

const ACTION_COLORS = { modify: "#d97706", delete: "#dc2626", add: "#2e8b57" };
const DEFAULT_COLOR = "#1d6fe0";
const EMPTY_COLOR  = "#d8d4c5";

// Brand: pretty-format from URL slug or title. Special-cases _tc and _wiki suffixes.
const BRAND_OVERRIDES = {
  apple: 'Apple', openai: 'OpenAI', meta: 'Meta', amazon: 'Amazon', anthropic: 'Anthropic',
  google: 'Google', microsoft: 'Microsoft', tesla: 'Tesla', nvidia: 'Nvidia',
  cbs: 'CBS', bbc: 'BBC', abc: 'ABC', cnn: 'CNN', nbc: 'NBC',
  nintendo: 'Nintendo', chrysler: 'Chrysler', volkswagen: 'Volkswagen',
  united_airlines: 'United Airlines', general_motors: 'General Motors',
  ufc: 'UFC', exxonmobil: 'ExxonMobil',
};
function deriveBrand() {
  const SOURCE_LABELS = { tc: 'TechCrunch', wiki: 'Wikipedia' };
  let raw = (location.pathname.split('/').filter(Boolean).pop() || '').replace('.html','');
  if (!raw) raw = (document.title || '').replace(/^CDT\s*[—-]\s*/i,'').trim();
  const m = raw.match(/^(.+?)_(tc|wiki)$/i);
  let key = raw, src = '';
  if (m) { key = m[1]; src = SOURCE_LABELS[m[2].toLowerCase()] || ''; }
  const lc = key.toLowerCase();
  let name = BRAND_OVERRIDES[lc];
  if (!name) {
    name = key.split(/[_\-\s]+/).map(w => w ? (w[0].toUpperCase() + w.slice(1)) : '').join(' ');
  }
  return src ? `${name} · ${src}` : name || 'CDT Visualization';
}
document.getElementById('brand-name').textContent = deriveBrand();

// Crumbs: total nodes / phases / cases
let totalNodes = 0;
function countNodes(n) { totalNodes++; (n.children || []).forEach(countNodes); }
countNodes(treeData);
document.getElementById('crumbs').textContent =
  `${totalNodes} nodes · ${adapterPhases.length} phases · ${caseStudies.length} case studies`;

let activePhaseIdx = -1;
let activeActions = {};
let activeCaseIdx = -1;

// ===== Controls =====
const controls = d3.select("#controls");

// PHASES section
const secPhases = controls.append("div").attr("class", "section");
secPhases.append("div").attr("class", "panel-title").text("CDT timeline");
secPhases.append("button")
  .attr("class", "phase-btn active")
  .attr("data-idx", -1)
  .html(`<div class="phase-name">Base CDT</div><div class="phase-meta">Original tree (no adaptation)</div>`)
  .on("click", function() { clearCase(); selectPhase(-1); });
adapterPhases.forEach((phase, i) => {
  const m = phase.actions.filter(a => a.action === "modify").length;
  const a = phase.actions.filter(a => a.action === "add").length;
  const d = phase.actions.filter(a => a.action === "delete").length;
  // Avoid showing the date range twice if phase_name already contains it.
  // Also strip the leading entity prefix from phase_name (e.g. "apple (2025-01-03 ~ 2025-03-27)" → "2025-01-03 ~ 2025-03-27")
  let pn = phase.phase_name || '';
  pn = pn.replace(/^[\w_\s-]+\s*\(([^)]*)\)\s*$/, '$1').trim();
  pn = pn.replace(/^[\w_]+\s+phase\s*\d+\s*$/i, '');  // wiki-style "Nintendo phase 0" → ""
  const meta = (phase.date_range && phase.date_range !== pn) ? (pn ? `${pn} · ${phase.date_range}` : phase.date_range) : pn;
  secPhases.append("button")
    .attr("class", "phase-btn")
    .attr("data-idx", i)
    .html(`
      <div class="phase-name">Phase ${i}</div>
      <div class="phase-meta">${escapeHtml(meta)}</div>
      <div class="phase-actions">
        ${m ? `<span class="pa modify">${m} modify</span>` : ''}
        ${a ? `<span class="pa add">${a} add</span>` : ''}
        ${d ? `<span class="pa delete">${d} delete</span>` : ''}
      </div>`)
    .on("click", function() { clearCase(); selectPhase(i); });
});

// CASES section
if (caseStudies.length > 0) {
  const secCases = controls.append("div").attr("class", "section");
  secCases.append("div").attr("class", "panel-title").text("Case studies");
  caseStudies.forEach((cs, i) => {
    const sB = cs.base.score, sBC = cs.base_cdt.score, sA = cs.adapted_cdt.score;
    const ev = eventsData[cs.event_id] || {};
    const action = (cs.reference || ev.action || '').slice(0, 110);
    secCases.append("button")
      .attr("class", "case-btn")
      .attr("data-case-idx", i)
      .html(`
        <span class="case-eid">${escapeHtml(cs.event_id)}</span><span class="case-tag">P${cs.phase}</span>
        <div class="case-action">${escapeHtml(action)}${action.length >= 110 ? '…' : ''}</div>
        <div class="case-scores">
          ${HIDE_ADAPTED_PRED
            ? `<span class="score-chip s-${sBC}">base CDT: ${scoreLabel(sBC)}</span>`
            : `<span class="score-chip s-${sBC}">${scoreLabel(sBC)}</span><span class="arrow">→</span><span class="score-chip s-${sA}">${scoreLabel(sA)}</span>`}
        </div>`)
      .on("click", function() { selectCase(i); });
  });
}

function selectPhase(idx) {
  activePhaseIdx = idx;
  controls.selectAll(".phase-btn").classed("active", function() {
    return +this.getAttribute("data-idx") === idx;
  });
  activeActions = {};
  if (idx >= 0 && idx < adapterPhases.length) {
    adapterPhases[idx].actions.forEach(a => {
      (activeActions[a.node_id] = activeActions[a.node_id] || []).push(a);
    });
  }
  renderPies();
}

// ===== Case selection =====
function selectCase(idx) {
  activeCaseIdx = idx;
  controls.selectAll(".case-btn").classed("active", function() {
    return +this.getAttribute("data-case-idx") === idx;
  });
  controls.selectAll(".phase-btn").classed("active", false);
  activeActions = {};
  const cs = caseStudies[idx];
  const act = caseActivations[idx];
  highlightCaseNodes(act);
  showCasePanel(cs, act);
}
function clearCase() {
  activeCaseIdx = -1;
  controls.selectAll(".case-btn").classed("active", false);
  closeDrawer('#case-panel');
  g.selectAll("g.node")
    .classed("node-glow-base", false)
    .classed("node-glow-adapted", false)
    .classed("node-glow-both", false)
    .classed("node-dimmed", false);
  g.selectAll("path.link").classed("link-dimmed", false);
}
function highlightCaseNodes(act) {
  const baseIds = new Set(act.base_cdt.activated_node_ids);
  const adaptedIds = HIDE_ADAPTED_PRED ? new Set() : new Set(act.adapted_cdt.activated_node_ids);
  const allActive = new Set([...baseIds, ...adaptedIds]);
  g.selectAll("g.node").each(function(d) {
    const el = d3.select(this);
    const nid = d.data.node_id;
    el.classed("node-dimmed", !allActive.has(nid));
    el.classed("node-glow-both", baseIds.has(nid) && adaptedIds.has(nid));
    el.classed("node-glow-base", baseIds.has(nid) && !adaptedIds.has(nid));
    el.classed("node-glow-adapted", !baseIds.has(nid) && adaptedIds.has(nid));
  });
  g.selectAll("path.link").classed("link-dimmed", true);
}

// ===== Drawers =====
function openDrawer(sel) { d3.select(sel).classed('open', true); }
function closeDrawer(sel) { d3.select(sel).classed('open', false); }
function drawerHeader(tag, title) {
  return `<div class="drawer-header">
    <span class="head-tag">${escapeHtml(tag)}</span>
    <h3>${escapeHtml(title)}</h3>
    <button class="close-x" onclick="this.closest('.drawer').classList.remove('open')">×</button>
  </div>`;
}

  const ev = eventsData[cs.event_id] || {};

      <div class="pred-card basecdt">
        <div class="pc-head"><span class="name-pill">Base CDT</span>${scoreBadge(cs.base_cdt.score)}
          <span style="margin-left:8px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--ink-faint);">${baseStmts.length} stmts</span></div>
        <div class="pred-text">${escapeHtml(cs.base_cdt.prediction)}</div>
        ${cs.base_cdt.score_reasoning ? `<div class="pred-reason"><b>Reasoning:</b> ${escapeHtml(cs.base_cdt.score_reasoning)}</div>` : ''}
      </div>
      ${HIDE_ADAPTED_PRED ? '' : `<div class="pred-card adapted">
        <div class="pc-head"><span class="name-pill">Adapted CDT</span>${scoreBadge(cs.adapted_cdt.score)}

// ===== NODE PANEL =====
function showNodePanel(d) {
  closeDrawer('#case-panel'); closeDrawer('#stmt-panel');
  const p = d3.select("#node-panel");
  const nid = d.data.node_id;
  const ne = nodeEventsData[nid] || { event_ids: [], statements_by_source: {}, n_events: 0 };
  // Title: prefer branded name (Root → "<Brand>'s behavior"), then friendly name, then node id
  const branded = brandedName(d);
  const title = (branded && branded !== nid) ? branded : `Node ${nid}`;

  let html = drawerHeader(nid, title);
  html += `<div class="drawer-body">`;
  if (d.data.gate) {
    html += `<div class="drawer-section">
      <div class="label">Gate question</div>
      <div class="body" style="color:var(--accent);">${hl(d.data.gate, d.data.gate_keywords)}</div>
    </div>`;
  }

  // Statements at this node (from base + each phase if different)
  const bySource = ne.statements_by_source || {};
  const allStmts = new Map(); // text -> {sources:[], n_yes_max}
  Object.entries(bySource).forEach(([src, list]) => {
    list.forEach(s => {
      if (!allStmts.has(s.text)) allStmts.set(s.text, {sources:[], n_yes:0});
      const e = allStmts.get(s.text);
      e.sources.push(src);
      e.n_yes = Math.max(e.n_yes, s.n_yes || 0);
    });
  });
  if (allStmts.size > 0) {
    html += `<div class="drawer-section">
      <div class="label">Statements at this node (${allStmts.size})</div>`;
    [...allStmts.entries()].forEach(([text, info]) => {
      const sourceLabels = info.sources.map(s => s === 'base' ? 'base' : s.replace('phase_','P')).join(', ');
      html += `<div class="stmt-card">
        <div class="text" data-stmt="${attrEsc(text)}">${escapeHtml(text)}</div>
        <div class="meta">
          <span class="pill">${escapeHtml(sourceLabels)}</span>
          <span class="pill">${info.n_yes} yes events</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Aggregated events — prefer cluster view (semantic groups with up to 5 reps each)
  // and fall back to flat date-sorted list when no clusters exist for this node.
  if (ne.event_ids && ne.event_ids.length > 0) {
    const clusters = ne.clusters;
    if (clusters && clusters.length > 0) {
      html += `<div class="drawer-section">
        <div class="label">Events grouped by theme (${ne.event_ids.length} total in ${clusters.length} themes)</div>
        <div class="cluster-list">`;
      clusters.forEach((c, ci) => {
        const reps = c.rep_event_ids || [];
        const hidden = (c.n_total || reps.length) - reps.length;
        html += `<div class="cluster-card">
          <div class="cluster-head">
            <span class="cluster-label">${escapeHtml(c.label)}</span>
            <span class="cluster-count">${c.n_total} events</span>
          </div>
          <div class="cluster-reps">`;
        reps.forEach(eid => {
          const e = eventsData[eid] || {};
          html += `<div class="event-row mini">
            <div class="top">
              <span class="eid">${escapeHtml(eid)}</span>
              ${e.phase != null ? `<span class="phase-tag">P${e.phase}</span>` : ''}
              <span>${escapeHtml(e.date || '')}</span>
            </div>
            ${e.action ? `<div class="action">${escapeHtml(e.action)}</div>` : ''}
          </div>`;
        });
        if (hidden > 0) {
          html += `<div class="cluster-more">+ ${hidden} more similar event${hidden === 1 ? '' : 's'} in this theme</div>`;
        }
        html += `</div></div>`;
      });
      html += `</div></div>`;
    } else {
      // Fallback: flat list (only used for nodes the clusterer skipped)
      html += `<div class="drawer-section">
        <div class="label">Events covered (${ne.event_ids.length}, sorted by date)</div>
        <div class="event-list">`;
      ne.event_ids.forEach(eid => {
        const e = eventsData[eid] || {};
        html += `<div class="event-row">
          <div class="top">
            <span class="eid">${escapeHtml(eid)}</span>
            ${e.phase != null ? `<span class="phase-tag">P${e.phase}</span>` : ''}
            <span>${escapeHtml(e.date || '')}</span>
          </div>
          ${e.action ? `<div class="action">${escapeHtml(e.action)}</div>` : ''}
          ${e.background ? `<div class="bg">${escapeHtml(e.background)}</div>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    }
  } else {
    html += `<div class="drawer-section"><div class="body muted" style="font-style:italic;">No events covered by statements at this node.</div></div>`;
  }

  html += `</div>`;
  p.html(html);
  p.selectAll('.stmt-card .text').on('click', function() {
    showStatementPanel(this.getAttribute('data-stmt'));
  });

// ===== STATEMENT PANEL =====
function showStatementPanel(stmtText) {
  closeDrawer('#case-panel'); closeDrawer('#node-panel');
  const cov = coverageData[stmtText];
  const p = d3.select("#stmt-panel");
  if (!cov) {
    p.html(drawerHeader('STMT', 'Statement coverage') +
      `<div class="drawer-body"><div class="stmt-text">${escapeHtml(stmtText)}</div>
      <div style="padding:18px; color:var(--ink-faint); font-style:italic;">No coverage data available for this statement.</div></div>`);
    openDrawer('#stmt-panel');
    return;
  }
  const yes = cov.yes || [];
  const sourceTag = cov.source === 'base' ? 'BASE' : cov.source.replace('adapted_phase_', 'P');

  let html = drawerHeader(sourceTag, `Statement at node ${cov.node_id}`);
  html += `<div class="drawer-body">`;
  if (cov.gate) {
    html += `<div class="gate-row"><div class="gate-label">Gate</div>${escapeHtml(cov.gate)}</div>`;
  }
  html += `<div class="stmt-text">${escapeHtml(stmtText)}</div>`;
  const cardFor = (eid, cls) => {
    const e = eventsData[eid] || {};
    return `<div class="ev-card ${cls}">
      <div class="top">
        <span class="eid">${escapeHtml(eid)}</span>
        ${e.phase != null ? `<span class="phase-tag">P${e.phase}</span>` : ''}
        <span>${escapeHtml(e.date || '')}</span>
      </div>
      ${e.action ? `<div class="action">${escapeHtml(e.action)}</div>` : ''}
      ${e.background ? `<div class="bg">${escapeHtml(e.background)}</div>` : ''}
    </div>`;
  };
  const borrowedNote = cov.yes_borrowed
    ? `<div class="borrowed-note">No direct supporting events were found in coverage. Showing related events from sibling statements at the same node.</div>`
    : '';
  html += `<div class="ev-section-label yes">Supporting events <span class="count">${yes.length}</span></div>${borrowedNote}`;
  // Prefer clustered render if available, otherwise flat list.
  const yesClusters = cov.yes_clusters;
  if (yesClusters && yesClusters.length > 0) {
    yesClusters.forEach(c => {
      const reps = c.rep_event_ids || [];
      const all = c.all_event_ids || reps;
      const others = all.filter(e => !reps.includes(e));
      html += `<div class="stmt-cluster">
        <div class="stmt-cluster-head">
          <span class="stmt-cluster-label">${escapeHtml(c.label || '(unlabeled cluster)')}</span>
          <span class="stmt-cluster-count">${c.n_total || all.length} events</span>
        </div>
        <div class="stmt-cluster-reps">${reps.map(eid => cardFor(eid, 'yes-card')).join('')}</div>
        ${others.length > 0 ? `
          <div class="stmt-cluster-others">
            <span class="stmt-cluster-others-label">+ ${others.length} other ${others.length === 1 ? 'event' : 'events'} in this theme:</span>
            ${others.map(eid => `<span class="stmt-cluster-other-eid" data-other-eid="${escapeHtml(eid)}">${escapeHtml(eid)}</span>`).join(' ')}
          </div>` : ''}
      </div>`;
    });
  } else {
    html += yes.map(eid => cardFor(eid, 'yes-card')).join('') ||
            `<div style="margin:0 18px 14px;color:var(--ink-faint);font-style:italic;font-size:12px;">none</div>`;
  }
  html += `</div>`;
  p.html(html);
  // Clicking a hidden eid chip expands its full card inline
  p.selectAll('[data-other-eid]').on('click', function() {
    const eid = this.getAttribute('data-other-eid');
    const e = eventsData[eid] || {};
    // Toggle: if already expanded, remove
    const sibling = this.nextElementSibling;
    if (sibling && sibling.classList.contains('stmt-cluster-other-card')) {
      sibling.remove();
      return;
    }
    const card = document.createElement('div');
    card.className = 'stmt-cluster-other-card';
    card.innerHTML = `<div class="ev-card yes-card">
      <div class="top">
        <span class="eid">${escapeHtml(eid)}</span>
        ${e.phase != null ? `<span class="phase-tag">P${e.phase}</span>` : ''}
        <span>${escapeHtml(e.date || '')}</span>
      </div>
      ${e.action ? `<div class="action">${escapeHtml(e.action)}</div>` : ''}
      ${e.background ? `<div class="bg">${escapeHtml(e.background)}</div>` : ''}
    </div>`;
    this.after(card);
  });
  openDrawer('#stmt-panel');
}

// ===== Pies & node decoration =====
function getNodeActionTypes(d) {
  const actions = activeActions[d.data.node_id];
  if (!actions) return [];
  const unique = [...new Set(actions.map(a => a.action))];
  return ["delete", "modify", "add"].filter(t => unique.includes(t));
}
function nodeRadius(d) {
  return 5 + Math.min(d.data.statements.length, 6) * 1.6;
}
function defaultColor(d) {
  return d.data.statements.length > 0 ? DEFAULT_COLOR : EMPTY_COLOR;
}
const arcGen = d3.arc();
function pieSlices(types, r) {
  if (types.length === 0) return [];
  const ang = (2 * Math.PI) / types.length;
  return types.map((t, i) => ({
    type: t, color: ACTION_COLORS[t],
    path: arcGen({ innerRadius: 0, outerRadius: r, startAngle: i * ang, endAngle: (i + 1) * ang })
  }));
}
function renderPies() {
  g.selectAll("g.node").each(function(d) {
    const el = d3.select(this);
    const r = nodeRadius(d);
    const types = getNodeActionTypes(d);
    el.selectAll(".pie-slice").remove();
    el.selectAll("circle.body").remove();
    if (types.length <= 1) {
      const color = types.length === 1 ? ACTION_COLORS[types[0]] : defaultColor(d);
      el.insert("circle", "text").attr("class", "body")
        .attr("r", r).style("fill", color)
        .style("stroke", d3.color(color).darker(0.4))
        .style("stroke-width", 1.6);
    } else {
      pieSlices(types, r).forEach(s => {
        el.insert("path", "text").attr("class", "pie-slice")
          .attr("d", s.path).style("fill", s.color)
          .style("stroke", "#fff").style("stroke-width", 1);
      });
      el.insert("circle", "text").attr("class", "body")
        .attr("r", r).style("fill", "none")
        .style("stroke", "#3a3f4a").style("stroke-width", 1.4);
    }
  });
}

// ===== Force-directed graph =====
const fullW = window.innerWidth, fullH = window.innerHeight;
const svg = d3.select("body").append("svg")
  .attr("class", "main-svg")
  .attr("width", fullW).attr("height", fullH);

// Dot-grid background
const pattern = svg.append("defs").append("pattern")
  .attr("id","dotgrid").attr("patternUnits","userSpaceOnUse")
  .attr("width", 24).attr("height", 24);
pattern.append("circle").attr("cx", 1.4).attr("cy", 1.4).attr("r", 0.9).attr("fill", "#dcd6c2");
svg.insert("rect", ":first-child")
  .attr("width","100%").attr("height","100%")
  .attr("fill","url(#dotgrid)").attr("opacity",0.7);

// Arrow marker for directed edges
svg.select("defs").append("marker")
  .attr("id", "arrow").attr("viewBox","0 -5 10 10")
  .attr("refX", 12).attr("refY", 0)
  .attr("markerWidth", 10).attr("markerHeight", 10)
  .attr("orient","auto-start-reverse")
  .append("path").attr("d","M0,-5 L10,0 L0,5 Z").attr("fill","#9a937c");

const g = svg.append("g");
const zoomBehavior = d3.zoom().scaleExtent([0.2, 3]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoomBehavior);

// Build flat node + link arrays from hierarchy. We never collapse/expand — all nodes are visible.
const root = d3.hierarchy(treeData);
const nodes = root.descendants().map(d => {
  d.id = d.data.node_id;        // stable id
  return d;
});
const links = root.links().map(l => ({ source: l.source.data.node_id, target: l.target.data.node_id }));

// Seed positions: layered by depth (left → right), randomized vertically.
// Use a wider layer spacing AND a vertical spread proportional to subtree size so dense
// subtrees get plenty of room from the start (no initial pile-up).
const maxDepth = d3.max(nodes, d => d.depth);
const layerWidth = Math.max(360, Math.min(520, Math.floor(fullW / Math.max(maxDepth + 1, 4))));

// Pre-compute subtree sizes so we can budget vertical span proportionally.
function subtreeSize(n) {
  if (!n.children || n.children.length === 0) return 1;
  return n.children.reduce((s, c) => s + subtreeSize(c), 0);
}
nodes.forEach(d => { d._sub = subtreeSize(d); });
const totalLeafLike = nodes.filter(d => !d.children || d.children.length === 0).length;
const verticalBudget = Math.max(fullH * 1.4, totalLeafLike * 70);

const cx = 120;        // Root pinned to the LEFT (was centered)
const cy = fullH / 2;
nodes.forEach(d => {
  d.x = cx + d.depth * layerWidth + (Math.random() - 0.5) * 60;
  // Spread wider — proportional to total leaf count so big trees fan out more
  d.y = cy + (Math.random() - 0.5) * verticalBudget * 0.6;
});
const rootNode = nodes.find(d => d.data.node_id === 'Root');
if (rootNode) { rootNode.fx = cx; rootNode.fy = cy; }

const tooltip = d3.select("#tooltip");
let tooltipTimeout = null;
tooltip.on("mouseover", () => clearTimeout(tooltipTimeout))
       .on("mouseout", () => { tooltipTimeout = setTimeout(() => tooltip.style("display","none"), 250); });

// Render links first (under nodes)
const linkSel = g.append("g").attr("class","links")
  .selectAll("path.link")
  .data(links, l => l.source + "->" + l.target)
  .join("path")
  .attr("class","link")
  .attr("marker-end","url(#arrow)");

// Render node groups
const nodeSel = g.append("g").attr("class","nodes")
  .selectAll("g.node")
  .data(nodes, d => d.id)
  .join("g")
  .attr("class","node")
  .call(d3.drag()
    .on("start", (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag",  (e,d) => { d.fx = e.x; d.fy = e.y; })
    .on("end",   (e,d) => { if (!e.active) sim.alphaTarget(0); /* keep pinned after drag — except Root which stays anchored */ if (d.data.node_id !== 'Root') { /* keep fx/fy so drag sticks */ } }))
  .on("click", (e,d) => { e.stopPropagation(); showNodePanel(d); })
  .on("mouseover", (e,d) => { clearTimeout(tooltipTimeout); showTooltip(e,d); })
  .on("mouseout",  () => { tooltipTimeout = setTimeout(() => tooltip.style("display","none"), 250); });

// Glow rings (case highlight)
nodeSel.append("circle").attr("class","glow-ring gr-base").attr("r", d => nodeRadius(d) + 7);
nodeSel.append("circle").attr("class","glow-ring gr-adapt").attr("r", d => nodeRadius(d) + 11);

// Body circle
nodeSel.append("circle").attr("class","body")
  .attr("r", d => nodeRadius(d))
  .style("fill", d => defaultColor(d))
  .style("stroke", d => d3.color(defaultColor(d)).darker(0.4))
  .style("stroke-width", 1.6);

// Multi-line label (right of circle by default; the simulation can flip if a node ends up left of its parent)
nodeSel.each(function(d) {
  const sel = d3.select(this);
  const r = nodeRadius(d);
  const offset = r + 12;
  const xPos = offset;  // start on the right; layoutLabel will be re-run on each tick if anchor flips
  const txt = sel.append("text").attr("text-anchor","start").attr("dy","0.35em");
  layoutLabel(txt, brandedName(d), xPos);
});

// Event count badge
nodeSel.each(function(d) {
  const ne = nodeEventsData[d.data.node_id];
  if (!ne || !ne.n_events) return;
  const r = nodeRadius(d);
  const grp = d3.select(this).append("g").attr("class","event-badge")
    .attr("transform", `translate(${r + 2}, ${-r - 2})`);
  const w = Math.max(16, ne.n_events.toString().length * 7 + 6);
  grp.append("rect").attr("x", -w/2).attr("y",-7).attr("width", w).attr("height",14).attr("rx",7);
  grp.append("text").attr("text-anchor","middle").attr("dy","0.32em").attr("x",0).text(ne.n_events);
});

// d3.forceSimulation with directional positioning toward right.
const sim = d3.forceSimulation(nodes)
  // Longer link distance + stronger spring so siblings don't pile up at start
  .force("link", d3.forceLink(links).id(d => d.id)
    .distance(d => 160 + (d.target._sub || 1) * 8)
    .strength(0.55))
  // Stronger repulsion so nodes spread out before settling
  .force("charge", d3.forceManyBody().strength(-520).distanceMin(20))
  // Bigger collision radius — accounts for label width and event badge
  .force("collide", d3.forceCollide().radius(d => nodeRadius(d) + 80).strength(1).iterations(2))
  // Soft x-positioning by depth (left → right flow)
  .force("x", d3.forceX(d => cx + d.depth * layerWidth).strength(0.22))
  // Very mild y-centering — most vertical placement is decided by collide + charge
  .force("y", d3.forceY(cy).strength(0.025))
  .alphaDecay(0.02)
  .on("tick", tick);

// Re-run layoutLabel only when a node's relative side to its parent has clearly flipped (avoids per-tick churn).
const labelSideCache = new Map();
function tick() {
  // Update link curves with cubic bezier between source and target
  linkSel.attr("d", d => {
    const sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
    const mx = (sx + tx) / 2;
    return `M${sx},${sy} C${mx},${sy} ${mx},${ty} ${tx},${ty}`;
  });
  // Update node positions
  nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);

  // Periodically (every ~6th tick) re-evaluate label side based on actual layout
  if (++tickCount % 6 === 0) {
    nodeSel.each(function(d) {
      const parent = d.parent;
      const onRight = parent ? (d.x >= parent.x) : true;
      if (labelSideCache.get(d.id) !== onRight) {
        labelSideCache.set(d.id, onRight);
        const txt = d3.select(this).select(function() {
          for (const t of this.querySelectorAll(":scope > text"))
            if (!t.parentNode.classList.contains("event-badge")) return t;
          return null;
        });
        if (!txt.empty()) {
          const r = nodeRadius(d);
          const offset = r + 12;
          txt.attr("text-anchor", onRight ? "start" : "end");
          txt.selectAll("tspan").remove();
          layoutLabel(txt, brandedName(d), onRight ? offset : -offset);
        }
      }
    });
  }
}
let tickCount = 0;

// Auto-fit on initial settle
let fitDone = false;
sim.on("end.fit", () => {
  if (fitDone) return;
  fitDone = true;
  fitToScreen();
});
function fitToScreen() {
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = d3.min(xs) - 200, maxX = d3.max(xs) + 320;
  const minY = d3.min(ys) - 80, maxY = d3.max(ys) + 80;
  const w = maxX - minX, h = maxY - minY;
  const k = Math.min(fullW / w, fullH / h, 1);
  const tx = (fullW - k * (minX + maxX)) / 2;
  const ty = (fullH - k * (minY + maxY)) / 2;
  svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
}

// Run a fast initial settle so first paint is already well-spaced
for (let i = 0; i < 200; i++) sim.tick();
tick();
fitToScreen();
fitDone = true;
sim.alpha(0.3).restart();   // gentle re-warm so user sees the spring action

// Pretty name: rename "Root" with the entity brand for the root node.
function brandedName(d) {
  const raw = d.data.name || d.data.node_id || '';
  if (d.data.node_id === 'Root') {
    const brand = (document.getElementById('brand-name')?.textContent || '').split('·')[0].trim();
    return brand ? `${brand}'s behavior` : 'Behavior overview';
  }
  return raw;
}

// Wrap text into multiple <tspan> lines (up to maxLines, ~ maxCharsPerLine each).
// xPos is applied to every tspan so the label sits to the side of the circle.
function layoutLabel(textSel, str, xPos) {
  const maxCharsPerLine = 30, maxLines = 3;
  const words = (str || '').split(/\s+/);
  const lines = []; let cur = '';
  for (const w of words) {
    if ((cur + ' ' + w).trim().length > maxCharsPerLine && cur) { lines.push(cur); cur = w; }
    else { cur = (cur ? cur + ' ' : '') + w; }
    if (lines.length >= maxLines) break;
  }
  if (cur && lines.length < maxLines) lines.push(cur);
  if (lines.length === maxLines && words.join(' ').length > lines.join(' ').length) {
    lines[maxLines-1] = lines[maxLines-1].slice(0, maxCharsPerLine - 1) + '…';
  }
  const lh = 13;
  const totalH = (lines.length - 1) * lh;
  lines.forEach((line, i) => {
    textSel.append("tspan")
      .attr("x", xPos)
      .attr("dy", i === 0 ? `${-totalH/2}px` : `${lh}px`)
      .text(line);
  });
}

// ===== Tooltip =====
function showTooltip(event, d) {
  const ne = nodeEventsData[d.data.node_id];
  let html = `<div><span class="nid">${escapeHtml(d.data.node_id)}</span>${ne && ne.n_events ? `<span class="ev-pill">${ne.n_events} events</span>` : ''}</div>`;
  if (d.data.gate) {
    html += `<div class="gate">${hl(d.data.gate, d.data.gate_keywords)}</div>`;
  }
  if (d.data.statements.length > 0) {
    d.data.statements.forEach(s => {
      html += `<div class="stmt" data-stmt="${attrEsc(s.text)}">${hl(s.text, s.keywords)}</div>`;
    });
  } else {
    html += `<div class="empty">No statements (router-only node)</div>`;
  }
  const actions = activeActions[d.data.node_id];
  if (actions && actions.length > 0) {
    html += `<div class="adapter-section">`;
    actions.forEach(a => {
      html += `<div class="adapter-action ${a.action}">${a.action}</div>`;
      if (a.action === "delete") {
        html += `<div class="old-stmt" data-stmt="${attrEsc(a.old_statement)}">${hl(a.old_statement, a.old_keywords)}</div>`;
      } else if (a.action === "modify") {
        html += `<div class="old-stmt" data-stmt="${attrEsc(a.old_statement)}">${hl(a.old_statement, a.old_keywords)}</div>`;
        html += `<div class="new-stmt" data-stmt="${attrEsc(a.new_statement)}">→ ${hl(a.new_statement, a.new_keywords)}</div>`;
        if (a.old_coverage != null && a.new_coverage != null) {
          html += `<div class="coverage">Coverage: ${(a.old_coverage*100).toFixed(0)}% → ${(a.new_coverage*100).toFixed(0)}%</div>`;
        }
      } else if (a.action === "add") {
        html += `<div class="new-stmt" data-stmt="${attrEsc(a.new_statement)}">+ ${hl(a.new_statement, a.new_keywords)}</div>`;
        if (a.new_coverage != null) {
          html += `<div class="coverage">Coverage: ${(a.new_coverage*100).toFixed(0)}%${a.n_events ? ` (${a.n_events} events)`:''}</div>`;
        }
      }
    });
    html += `</div>`;
  }
  html += `<div class="open-panel-cta" data-open-node="1">Open node details →</div>`;
  tooltip.html(html).style("display", "block")
    .style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 10) + "px");
  tooltip.selectAll('[data-stmt]').on('click', function() {
    showStatementPanel(this.getAttribute('data-stmt'));
  });
  tooltip.selectAll('[data-open-node]').on('click', () => { showNodePanel(d); });
}

} // end init()
